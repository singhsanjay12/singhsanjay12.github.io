<svg width="800" height="420" viewBox="0 -25 800 420" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',system-ui,sans-serif">
  <defs>
    <style>
      @keyframes dash { to { stroke-dashoffset: -20; } }
      .flow { animation: dash 1.6s linear infinite; }
    </style>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#eef2ff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000018"/>
    </filter>
    <marker id="mb" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#4f8ef7"/>
    </marker>
    <marker id="mg" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#27ae60"/>
    </marker>
    <marker id="mr" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#e74c3c"/>
    </marker>
    <marker id="mo" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#f97316"/>
    </marker>
    <marker id="mx" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="0" y="-25" width="800" height="420" fill="url(#bg)"/>

  <!-- Dot grid -->
  <g fill="#c7d2fe" opacity="0.4">
    <g id="dc">
      <circle cx="0" cy="0" r="1.5"/><circle cx="0" cy="40" r="1.5"/>
      <circle cx="0" cy="80" r="1.5"/><circle cx="0" cy="120" r="1.5"/>
      <circle cx="0" cy="160" r="1.5"/><circle cx="0" cy="200" r="1.5"/>
      <circle cx="0" cy="240" r="1.5"/><circle cx="0" cy="280" r="1.5"/>
      <circle cx="0" cy="320" r="1.5"/>
    </g>
    <use href="#dc" x="40"/><use href="#dc" x="80"/><use href="#dc" x="120"/>
    <use href="#dc" x="160"/><use href="#dc" x="200"/><use href="#dc" x="240"/>
    <use href="#dc" x="280"/><use href="#dc" x="320"/><use href="#dc" x="360"/>
    <use href="#dc" x="400"/><use href="#dc" x="440"/><use href="#dc" x="480"/>
    <use href="#dc" x="520"/><use href="#dc" x="560"/><use href="#dc" x="600"/>
    <use href="#dc" x="640"/><use href="#dc" x="680"/><use href="#dc" x="720"/>
    <use href="#dc" x="760"/>
  </g>

  <!-- ── Layer 1: Banner (y = -25 → 10) ── -->
  <rect x="0" y="-25" width="800" height="35" fill="#1e293b" opacity="0.85"/>
  <text x="400" y="-3" text-anchor="middle" fill="white" font-size="10" font-weight="700">Same incoming request · three algorithms · three different servers chosen</text>

  <!-- Incoming request arrow — 20 px gap so it is clearly visible -->
  <line x1="400" y1="10" x2="400" y2="30" stroke="#4f8ef7" stroke-width="2.5" stroke-dasharray="5 3" class="flow" marker-end="url(#mb)"/>

  <!-- ── Layer 2: Load Balancer (y = 32 → 88) ── -->
  <rect x="305" y="32" width="190" height="56" rx="10" fill="white" stroke="#4f8ef7" stroke-width="2" filter="url(#shadow)"/>
  <text x="400" y="56" text-anchor="middle" fill="#1d4ed8" font-size="11" font-weight="700">Load Balancer</text>
  <text x="400" y="74" text-anchor="middle" fill="#64748b" font-size="8.5">picks algorithm per request</text>

  <!-- ── Connector lines: from LB bottom (y=88) to badge tops (y=116)       ──
       28 px vertical drop gives a clearly visible downward slope.            -->
  <!-- Left: fans out to Round Robin badge centre (x=122) -->
  <line x1="350" y1="88" x2="122" y2="116" stroke="#f97316" stroke-width="1.5" stroke-dasharray="5 3" class="flow"/>
  <!-- Centre: drops straight to Least Connections badge -->
  <line x1="400" y1="88" x2="400" y2="116" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="5 3" class="flow"/>
  <!-- Right: fans out to IP Hash badge centre (x=678) -->
  <line x1="450" y1="88" x2="678" y2="116" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5 3" class="flow"/>

  <!-- ── Layer 3: Algorithm badges (y = 117 → 169, height = 52) ── -->

  <!-- Round Robin badge — centred at x=122 -->
  <rect x="50" y="117" width="144" height="52" rx="7" fill="white" stroke="#f97316" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="122" y="135" text-anchor="middle" fill="#c2410c" font-size="8" font-weight="700">Round Robin</text>
  <text x="122" y="149" text-anchor="middle" fill="#9a3412" font-size="7.5">"Server A's turn" → A</text>
  <text x="122" y="161" text-anchor="middle" fill="#fb923c" font-size="7" font-style="italic">ignores 8 connections</text>

  <!-- Least Connections badge — centred at x=400 -->
  <rect x="328" y="117" width="144" height="52" rx="7" fill="white" stroke="#27ae60" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="400" y="135" text-anchor="middle" fill="#15803d" font-size="8" font-weight="700">Least Connections</text>
  <text x="400" y="149" text-anchor="middle" fill="#166534" font-size="7.5">"Server B has 2" → B</text>
  <text x="400" y="161" text-anchor="middle" fill="#22c55e" font-size="7" font-style="italic">routes to least busy</text>

  <!-- IP Hash badge — centred at x=678 -->
  <rect x="606" y="117" width="144" height="52" rx="7" fill="white" stroke="#94a3b8" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="678" y="135" text-anchor="middle" fill="#334155" font-size="8" font-weight="700">IP Hash</text>
  <text x="678" y="149" text-anchor="middle" fill="#475569" font-size="7.5">hash(client IP) → C</text>
  <text x="678" y="161" text-anchor="middle" fill="#94a3b8" font-size="7" font-style="italic">ignores all load signals</text>

  <!-- Badge → server arrows (badge bottom y=169, server top y=194, 25 px gap) -->
  <line x1="122" y1="170" x2="122" y2="192" stroke="#f97316" stroke-width="2.5" stroke-dasharray="5 3" class="flow" marker-end="url(#mo)"/>
  <line x1="400" y1="170" x2="400" y2="192" stroke="#27ae60" stroke-width="2.5" stroke-dasharray="5 3" class="flow" marker-end="url(#mg)"/>
  <line x1="678" y1="170" x2="678" y2="192" stroke="#94a3b8" stroke-width="2.5" stroke-dasharray="5 3" class="flow" marker-end="url(#mx)"/>

  <!-- ── Layer 4: Server boxes (y = 194 → 302, height = 108) ──
       centres: 122 / 400 / 678   width: 184   margins: 30 / 308 / 586 -->

  <!-- Server A (left) — 8 connections, busy -->
  <rect x="30" y="194" width="184" height="108" rx="9" fill="#fff7ed" stroke="#f97316" stroke-width="2" filter="url(#shadow)"/>
  <rect x="30" y="194" width="184" height="30" rx="9" fill="#f97316"/>
  <rect x="30" y="210" width="184" height="14" fill="#f97316"/>
  <text x="122" y="215" text-anchor="middle" fill="white" font-size="10" font-weight="700">Server A</text>
  <text x="122" y="238" text-anchor="middle" fill="#9a3412" font-size="8.5" font-weight="600">8 active connections</text>
  <!-- 8 dots centred at x=122, 14 px apart -->
  <g fill="#f97316" opacity="0.7">
    <circle cx="73"  cy="256" r="5"/>
    <circle cx="87"  cy="256" r="5"/>
    <circle cx="101" cy="256" r="5"/>
    <circle cx="115" cy="256" r="5"/>
    <circle cx="129" cy="256" r="5"/>
    <circle cx="143" cy="256" r="5"/>
    <circle cx="157" cy="256" r="5"/>
    <circle cx="171" cy="256" r="5"/>
  </g>
  <text x="122" y="282" text-anchor="middle" fill="#c2410c" font-size="8" font-style="italic">busy · high latency</text>

  <!-- Server B (centre) — 2 connections, available -->
  <rect x="308" y="194" width="184" height="108" rx="9" fill="#f0fff4" stroke="#27ae60" stroke-width="2" filter="url(#shadow)"/>
  <rect x="308" y="194" width="184" height="30" rx="9" fill="#27ae60"/>
  <rect x="308" y="210" width="184" height="14" fill="#27ae60"/>
  <text x="400" y="215" text-anchor="middle" fill="white" font-size="10" font-weight="700">Server B</text>
  <text x="400" y="238" text-anchor="middle" fill="#166534" font-size="8.5" font-weight="600">2 active connections</text>
  <!-- 2 dots centred at x=400, 14 px apart -->
  <g fill="#27ae60" opacity="0.7">
    <circle cx="393" cy="256" r="5"/>
    <circle cx="407" cy="256" r="5"/>
  </g>
  <text x="400" y="282" text-anchor="middle" fill="#15803d" font-size="8" font-style="italic">available · low latency</text>

  <!-- Server C (right) — 5 connections, moderate -->
  <rect x="586" y="194" width="184" height="108" rx="9" fill="#f8fafc" stroke="#94a3b8" stroke-width="2" filter="url(#shadow)"/>
  <rect x="586" y="194" width="184" height="30" rx="9" fill="#94a3b8"/>
  <rect x="586" y="210" width="184" height="14" fill="#94a3b8"/>
  <text x="678" y="215" text-anchor="middle" fill="white" font-size="10" font-weight="700">Server C</text>
  <text x="678" y="238" text-anchor="middle" fill="#475569" font-size="8.5" font-weight="600">5 active connections</text>
  <!-- 5 dots centred at x=678, 14 px apart -->
  <g fill="#94a3b8" opacity="0.7">
    <circle cx="650" cy="256" r="5"/>
    <circle cx="664" cy="256" r="5"/>
    <circle cx="678" cy="256" r="5"/>
    <circle cx="692" cy="256" r="5"/>
    <circle cx="706" cy="256" r="5"/>
  </g>
  <text x="678" y="282" text-anchor="middle" fill="#64748b" font-size="8" font-style="italic">moderate load</text>

  <!-- ── Caption (y = 324+) ── -->
  <line x1="200" y1="324" x2="600" y2="324" stroke="#e2e8f0" stroke-width="1"/>
  <text x="400" y="341" text-anchor="middle" fill="#1e293b" font-size="12" font-weight="700" font-family="Georgia,serif" font-style="italic">"Each algorithm has a different definition of equal."</text>
  <text x="400" y="357" text-anchor="middle" fill="#94a3b8" font-size="9" font-style="italic">Round robin counts requests. Least connections counts load. IP hash ignores both.</text>
</svg>
