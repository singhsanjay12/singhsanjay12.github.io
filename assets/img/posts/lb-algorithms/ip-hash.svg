<svg width="800" height="420" viewBox="0 -25 800 420" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',system-ui,sans-serif">
  <defs>
    <style>
      @keyframes dash { to { stroke-dashoffset: -20; } }
      .flow { animation: dash 1.6s linear infinite; }
    </style>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#eef2ff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000018"/>
    </filter>
    <marker id="mb" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#4f8ef7"/>
    </marker>
    <marker id="mg" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#27ae60"/>
    </marker>
    <marker id="mr" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#e74c3c"/>
    </marker>
    <marker id="mp" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#8b5cf6"/>
    </marker>
  </defs>

  <rect x="0" y="-25" width="800" height="420" fill="url(#bg)"/>

  <!-- Dot grid -->
  <g fill="#c7d2fe" opacity="0.4">
    <g id="dc">
      <circle cx="0" cy="0" r="1.5"/><circle cx="0" cy="40" r="1.5"/>
      <circle cx="0" cy="80" r="1.5"/><circle cx="0" cy="120" r="1.5"/>
      <circle cx="0" cy="160" r="1.5"/><circle cx="0" cy="200" r="1.5"/>
      <circle cx="0" cy="240" r="1.5"/><circle cx="0" cy="280" r="1.5"/>
      <circle cx="0" cy="320" r="1.5"/>
    </g>
    <use href="#dc" x="40"/><use href="#dc" x="80"/><use href="#dc" x="120"/>
    <use href="#dc" x="160"/><use href="#dc" x="200"/><use href="#dc" x="240"/>
    <use href="#dc" x="280"/><use href="#dc" x="320"/><use href="#dc" x="360"/>
    <use href="#dc" x="400"/><use href="#dc" x="440"/><use href="#dc" x="480"/>
    <use href="#dc" x="520"/><use href="#dc" x="560"/><use href="#dc" x="600"/>
    <use href="#dc" x="640"/><use href="#dc" x="680"/><use href="#dc" x="720"/>
    <use href="#dc" x="760"/>
  </g>

  <!-- Top banner -->
  <rect x="0" y="-25" width="800" height="35" fill="#1e293b" opacity="0.85"/>
  <text x="400" y="-3" text-anchor="middle" fill="white" font-size="10" font-weight="700">IP Hash: same IP always lands on the same server · load balance is not guaranteed</text>

  <!-- ── Client boxes (left column) ── -->

  <!-- Client 1 — regular user -->
  <rect x="20" y="18" width="180" height="42" rx="8" fill="white" stroke="#4f8ef7" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="110" y="36" text-anchor="middle" fill="#4f8ef7" font-size="9" font-weight="700">Client 1</text>
  <text x="110" y="52" text-anchor="middle" fill="#64748b" font-size="7.5" font-family="monospace">IP: 203.0.113.10</text>

  <!-- Client 2 — regular user -->
  <rect x="20" y="118" width="180" height="42" rx="8" fill="white" stroke="#27ae60" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="110" y="136" text-anchor="middle" fill="#27ae60" font-size="9" font-weight="700">Client 2</text>
  <text x="110" y="152" text-anchor="middle" fill="#64748b" font-size="7.5" font-family="monospace">IP: 198.51.100.42</text>

  <!-- NAT Gateway — many users behind one IP -->
  <rect x="20" y="218" width="180" height="72" rx="8" fill="#faf5ff" stroke="#8b5cf6" stroke-width="2" filter="url(#shadow)"/>
  <text x="110" y="238" text-anchor="middle" fill="#6d28d9" font-size="9" font-weight="700">NAT Gateway</text>
  <text x="110" y="253" text-anchor="middle" fill="#64748b" font-size="7.5" font-family="monospace">IP: 10.0.0.1</text>
  <text x="110" y="268" text-anchor="middle" fill="#7c3aed" font-size="7.5" font-weight="600">1,200 users behind</text>
  <text x="110" y="281" text-anchor="middle" fill="#8b5cf6" font-size="7" font-style="italic">all appear as one IP</text>

  <!-- ── Load Balancer (centre) ── -->
  <rect x="295" y="118" width="210" height="68" rx="10" fill="white" stroke="#4f8ef7" stroke-width="2" filter="url(#shadow)"/>
  <text x="400" y="140" text-anchor="middle" fill="#1d4ed8" font-size="10" font-weight="700">Load Balancer</text>
  <text x="400" y="156" text-anchor="middle" fill="#64748b" font-size="8">IP Hash Algorithm</text>
  <rect x="315" y="161" width="170" height="16" rx="4" fill="#eff6ff"/>
  <text x="400" y="173" text-anchor="middle" fill="#1d4ed8" font-size="7.5" font-family="monospace">hash(src_ip) % num_servers</text>

  <!-- Arrows from clients to LB -->
  <line x1="201" y1="39" x2="293" y2="142" stroke="#4f8ef7" stroke-width="1.5" stroke-dasharray="5 3" class="flow" marker-end="url(#mb)"/>
  <line x1="201" y1="139" x2="293" y2="152" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="5 3" class="flow" marker-end="url(#mg)"/>
  <line x1="201" y1="254" x2="293" y2="168" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="5 3" class="flow" marker-end="url(#mp)"/>

  <!-- ── Server boxes (right column) ── -->

  <!-- Server A — receives Client 1 (normal load) -->
  <rect x="575" y="18" width="200" height="80" rx="9" fill="#eff6ff" stroke="#4f8ef7" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="675" y="40" text-anchor="middle" fill="#1d4ed8" font-size="10" font-weight="700">Server A</text>
  <text x="675" y="57" text-anchor="middle" fill="#374151" font-size="8">hash(203.0.113.10) → A</text>
  <rect x="595" y="62" width="160" height="14" rx="3" fill="#dbeafe"/>
  <text x="675" y="73" text-anchor="middle" fill="#1e40af" font-size="7.5" font-weight="600">normal load · Client 1 always here</text>
  <text x="675" y="90" text-anchor="middle" fill="#60a5fa" font-size="7.5" font-style="italic">~30 req/s</text>

  <!-- Server B — receives Client 2 (normal load) -->
  <rect x="575" y="118" width="200" height="80" rx="9" fill="#f0fff4" stroke="#27ae60" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="675" y="140" text-anchor="middle" fill="#166534" font-size="10" font-weight="700">Server B</text>
  <text x="675" y="157" text-anchor="middle" fill="#374151" font-size="8">hash(198.51.100.42) → B</text>
  <rect x="595" y="162" width="160" height="14" rx="3" fill="#dcfce7"/>
  <text x="675" y="173" text-anchor="middle" fill="#166534" font-size="7.5" font-weight="600">normal load · Client 2 always here</text>
  <text x="675" y="190" text-anchor="middle" fill="#4ade80" font-size="7.5" font-style="italic">~25 req/s</text>

  <!-- Server C — receives NAT (overloaded) -->
  <rect x="575" y="218" width="200" height="96" rx="9" fill="#fff0f0" stroke="#e74c3c" stroke-width="2" filter="url(#shadow)"/>
  <text x="675" y="240" text-anchor="middle" fill="#c0392b" font-size="10" font-weight="700">Server C  ·  OVERLOADED</text>
  <text x="675" y="257" text-anchor="middle" fill="#374151" font-size="8">hash(10.0.0.1) → C</text>
  <rect x="595" y="262" width="160" height="14" rx="3" fill="#fee2e2"/>
  <text x="675" y="273" text-anchor="middle" fill="#991b1b" font-size="7.5" font-weight="700">1,200 users · all pinned here</text>
  <!-- Load bar -->
  <rect x="595" y="281" width="160" height="10" rx="3" fill="#fca5a5"/>
  <rect x="595" y="281" width="152" height="10" rx="3" fill="#e74c3c"/>
  <text x="675" y="305" text-anchor="middle" fill="#e74c3c" font-size="7.5" font-style="italic">~1,800 req/s · no escape</text>

  <!-- Arrows from LB to servers -->
  <line x1="506" y1="136" x2="573" y2="58" stroke="#4f8ef7" stroke-width="1.5" stroke-dasharray="5 3" class="flow" marker-end="url(#mb)"/>
  <line x1="506" y1="152" x2="573" y2="158" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="5 3" class="flow" marker-end="url(#mg)"/>
  <line x1="506" y1="168" x2="573" y2="258" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="5 3" class="flow" marker-end="url(#mp)"/>

  <!-- Caption -->
  <line x1="200" y1="345" x2="600" y2="345" stroke="#e2e8f0" stroke-width="1"/>
  <text x="400" y="362" text-anchor="middle" fill="#1e293b" font-size="12" font-weight="700" font-family="Georgia,serif" font-style="italic">"IP hash trades balance for consistency."</text>
  <text x="400" y="378" text-anchor="middle" fill="#94a3b8" font-size="9" font-style="italic">A NAT gateway behind one IP pins thousands of users to a single server — with no way to rebalance.</text>
</svg>
