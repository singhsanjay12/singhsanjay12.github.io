<svg width="800" height="420" viewBox="0 -25 800 420" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#eef2ff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000018"/>
    </filter>
  </defs>

  <rect x="0" y="-25" width="800" height="420" fill="url(#bg)"/>

  <!-- Dot grid -->
  <g fill="#c7d2fe" opacity="0.4">
    <g id="dc">
      <circle cx="0" cy="0" r="1.5"/><circle cx="0" cy="40" r="1.5"/><circle cx="0" cy="80" r="1.5"/>
      <circle cx="0" cy="120" r="1.5"/><circle cx="0" cy="160" r="1.5"/><circle cx="0" cy="200" r="1.5"/>
      <circle cx="0" cy="240" r="1.5"/><circle cx="0" cy="280" r="1.5"/><circle cx="0" cy="320" r="1.5"/>
    </g>
    <use href="#dc" x="40"/><use href="#dc" x="80"/><use href="#dc" x="120"/><use href="#dc" x="160"/>
    <use href="#dc" x="200"/><use href="#dc" x="240"/><use href="#dc" x="280"/><use href="#dc" x="320"/>
    <use href="#dc" x="360"/><use href="#dc" x="400"/><use href="#dc" x="440"/><use href="#dc" x="480"/>
    <use href="#dc" x="520"/><use href="#dc" x="560"/><use href="#dc" x="600"/><use href="#dc" x="640"/>
    <use href="#dc" x="680"/><use href="#dc" x="720"/><use href="#dc" x="760"/>
  </g>

  <!-- Banner -->
  <rect x="0" y="-25" width="800" height="35" fill="#1e293b" opacity="0.85"/>
  <text x="400" y="-3" text-anchor="middle" fill="white" font-size="10" font-weight="700">Two questions determine the algorithm  ·  server homogeneity  ·  request uniformity</text>

  <!-- ── Q1: diamond centred at (400, 76) ──
       points: top(400,53) right(477,76) bottom(400,99) left(323,76) -->
  <polygon points="400,53 477,76 400,99 323,76" fill="white" stroke="#475569" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="400" y="72" text-anchor="middle" fill="#1e293b" font-size="8.5" font-weight="700">All servers</text>
  <text x="400" y="85" text-anchor="middle" fill="#1e293b" font-size="8.5" font-weight="700">same capacity?</text>

  <!-- Q1 → Q2L (No): from left point (323,76) to Q2L top (185,148) -->
  <line x1="323" y1="76" x2="185" y2="148" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="238" y="104" text-anchor="middle" fill="#64748b" font-size="8.5" font-weight="700">no</text>

  <!-- Q1 → Q2R (Yes): from right point (477,76) to Q2R top (615,148) -->
  <line x1="477" y1="76" x2="615" y2="148" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="562" y="104" text-anchor="middle" fill="#1d4ed8" font-size="8.5" font-weight="700">yes</text>

  <!-- ── Q2L: "Request cost varies?" centred at (185, 171) ──
       points: top(185,148) right(255,171) bottom(185,194) left(115,171) -->
  <polygon points="185,148 255,171 185,194 115,171" fill="white" stroke="#475569" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="185" y="167" text-anchor="middle" fill="#1e293b" font-size="8.5" font-weight="700">Request cost</text>
  <text x="185" y="179" text-anchor="middle" fill="#1e293b" font-size="8.5" font-weight="700">varies?</text>

  <!-- ── Q2R: "Request cost varies?" centred at (615, 171) ──
       points: top(615,148) right(685,171) bottom(615,194) left(545,171) -->
  <polygon points="615,148 685,171 615,194 545,171" fill="white" stroke="#475569" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="615" y="167" text-anchor="middle" fill="#1e293b" font-size="8.5" font-weight="700">Request cost</text>
  <text x="615" y="179" text-anchor="middle" fill="#1e293b" font-size="8.5" font-weight="700">varies?</text>

  <!-- Q2L → WRR (No): from left point (115,171) to WRR top centre (80,233) -->
  <line x1="115" y1="171" x2="80" y2="233" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="79" y="204" text-anchor="end" fill="#64748b" font-size="8" font-weight="700">no</text>

  <!-- Q2L → WLC (Yes): from right point (255,171) to WLC top centre (295,233) -->
  <line x1="255" y1="171" x2="295" y2="233" stroke="#4f8ef7" stroke-width="1.5"/>
  <text x="294" y="204" fill="#4f8ef7" font-size="8" font-weight="700">yes</text>

  <!-- Q2R → LC (Yes): from left point (545,171) to LC top centre (505,233) -->
  <line x1="545" y1="171" x2="505" y2="233" stroke="#27ae60" stroke-width="1.5"/>
  <text x="507" y="204" text-anchor="end" fill="#27ae60" font-size="8" font-weight="700">yes</text>

  <!-- Q2R → RR (No): from right point (685,171) to RR top centre (715,233) -->
  <line x1="685" y1="171" x2="715" y2="233" stroke="#f97316" stroke-width="1.5"/>
  <text x="714" y="204" fill="#f97316" font-size="8" font-weight="700">no</text>

  <!-- ── Algorithm boxes (top y=233, bottom y=303, height=70) ── -->

  <!-- WRR: x=10–150, centre 80 — slate -->
  <rect x="10"  y="233" width="140" height="70" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="10"  y="233" width="140" height="30" rx="8" fill="#94a3b8"/>
  <rect x="10"  y="248" width="140" height="15" fill="#94a3b8"/>
  <text x="80"  y="245" text-anchor="middle" fill="white" font-size="8.5" font-weight="700">Weighted</text>
  <text x="80"  y="257" text-anchor="middle" fill="white" font-size="8.5" font-weight="700">Round Robin</text>
  <text x="80"  y="275" text-anchor="middle" fill="#475569" font-size="8">diff capacity</text>
  <text x="80"  y="288" text-anchor="middle" fill="#64748b" font-size="7.5" font-style="italic">uniform cost</text>

  <!-- WLC: x=225–365, centre 295 — blue -->
  <rect x="225" y="233" width="140" height="70" rx="8" fill="#eff6ff" stroke="#4f8ef7" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="225" y="233" width="140" height="30" rx="8" fill="#4f8ef7"/>
  <rect x="225" y="248" width="140" height="15" fill="#4f8ef7"/>
  <text x="295" y="245" text-anchor="middle" fill="white" font-size="8.5" font-weight="700">Weighted Least</text>
  <text x="295" y="257" text-anchor="middle" fill="white" font-size="8.5" font-weight="700">Connections</text>
  <text x="295" y="275" text-anchor="middle" fill="#1d4ed8" font-size="8">diff capacity</text>
  <text x="295" y="288" text-anchor="middle" fill="#3b82f6" font-size="7.5" font-style="italic">variable cost</text>

  <!-- LC: x=435–575, centre 505 — green -->
  <rect x="435" y="233" width="140" height="70" rx="8" fill="#f0fff4" stroke="#27ae60" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="435" y="233" width="140" height="30" rx="8" fill="#27ae60"/>
  <rect x="435" y="248" width="140" height="15" fill="#27ae60"/>
  <text x="505" y="245" text-anchor="middle" fill="white" font-size="8.5" font-weight="700">Least</text>
  <text x="505" y="257" text-anchor="middle" fill="white" font-size="8.5" font-weight="700">Connections</text>
  <text x="505" y="275" text-anchor="middle" fill="#166534" font-size="8">same capacity</text>
  <text x="505" y="288" text-anchor="middle" fill="#22c55e" font-size="7.5" font-style="italic">variable cost</text>

  <!-- RR: x=650–790, centre 720 — orange -->
  <rect x="650" y="233" width="140" height="70" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="650" y="233" width="140" height="30" rx="8" fill="#f97316"/>
  <rect x="650" y="248" width="140" height="15" fill="#f97316"/>
  <text x="720" y="245" text-anchor="middle" fill="white" font-size="8.5" font-weight="700">Round</text>
  <text x="720" y="257" text-anchor="middle" fill="white" font-size="8.5" font-weight="700">Robin</text>
  <text x="720" y="275" text-anchor="middle" fill="#9a3412" font-size="8">same capacity</text>
  <text x="720" y="288" text-anchor="middle" fill="#fb923c" font-size="7.5" font-style="italic">uniform cost</text>

  <!-- Caption -->
  <line x1="200" y1="330" x2="600" y2="330" stroke="#e2e8f0" stroke-width="1"/>
  <text x="400" y="347" text-anchor="middle" fill="#1e293b" font-size="12" font-weight="700" font-family="Georgia,serif" font-style="italic">"Two variables predict the right algorithm."</text>
  <text x="400" y="363" text-anchor="middle" fill="#94a3b8" font-size="9" font-style="italic">Server homogeneity and request uniformity. When both are true, round robin is hard to beat.</text>
</svg>
