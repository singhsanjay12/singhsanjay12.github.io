<svg xmlns="http://www.w3.org/2000/svg" width="800" viewBox="0 0 800 400" font-family="system-ui, -apple-system, Segoe UI, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="node" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#4f46e5"/>
    </linearGradient>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto">
      <path d="M0 0 L8 4 L0 8 Z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="800" height="400" fill="url(#bg)"/>

  <text x="400" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#312e81">TLS Termination at Scale</text>
  <text x="400" y="66" text-anchor="middle" font-size="13" fill="#64748b">One rotating session-ticket key, shared across the fleet, so resumption works on any node</text>

  <!-- client -->
  <rect x="40" y="170" width="120" height="64" rx="10" fill="#1e293b"/>
  <text x="100" y="198" text-anchor="middle" font-size="13" font-weight="600" fill="#f8fafc">Client</text>
  <text x="100" y="217" text-anchor="middle" font-size="11" fill="#94a3b8">holds ticket</text>

  <!-- load balancer -->
  <rect x="210" y="172" width="96" height="60" rx="10" fill="#312e81"/>
  <text x="258" y="198" text-anchor="middle" font-size="12" font-weight="600" fill="#f8fafc">Load</text>
  <text x="258" y="215" text-anchor="middle" font-size="12" font-weight="600" fill="#f8fafc">Balancer</text>

  <line x1="160" y1="202" x2="206" y2="202" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- shared ticket key store -->
  <rect x="356" y="92" width="200" height="56" rx="10" fill="#22c55e"/>
  <text x="456" y="116" text-anchor="middle" font-size="13" font-weight="700" fill="#052e16">Shared Ticket Key</text>
  <text x="456" y="134" text-anchor="middle" font-size="11" fill="#052e16">rotates every few hours</text>

  <!-- proxy fleet -->
  <g>
    <rect x="356" y="170" width="150" height="64" rx="10" fill="url(#node)"/>
    <text x="431" y="196" text-anchor="middle" font-size="13" font-weight="600" fill="#f8fafc">TLS Proxy A</text>
    <text x="431" y="215" text-anchor="middle" font-size="11" fill="#c7d2fe">terminate + resume</text>
  </g>
  <g>
    <rect x="356" y="248" width="150" height="64" rx="10" fill="url(#node)"/>
    <text x="431" y="274" text-anchor="middle" font-size="13" font-weight="600" fill="#f8fafc">TLS Proxy B</text>
    <text x="431" y="293" text-anchor="middle" font-size="11" fill="#c7d2fe">terminate + resume</text>
  </g>
  <g>
    <rect x="356" y="326" width="150" height="56" rx="10" fill="url(#node)"/>
    <text x="431" y="350" text-anchor="middle" font-size="13" font-weight="600" fill="#f8fafc">TLS Proxy C</text>
    <text x="431" y="368" text-anchor="middle" font-size="11" fill="#c7d2fe">terminate + resume</text>
  </g>

  <!-- LB to fleet -->
  <line x1="306" y1="202" x2="352" y2="202" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="306" y1="208" x2="352" y2="278" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="306" y1="214" x2="352" y2="350" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- key distribution (dashed) -->
  <line x1="431" y1="148" x2="431" y2="166" stroke="#22c55e" stroke-width="2" stroke-dasharray="4 3"/>
  <line x1="456" y1="148" x2="456" y2="276" stroke="#22c55e" stroke-width="2" stroke-dasharray="4 3"/>
  <line x1="481" y1="148" x2="481" y2="350" stroke="#22c55e" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="540" y="166" font-size="10" fill="#16a34a">same key to all</text>

  <!-- backends -->
  <rect x="616" y="172" width="144" height="60" rx="10" fill="#1e293b"/>
  <text x="688" y="198" text-anchor="middle" font-size="13" font-weight="600" fill="#f8fafc">Backends</text>
  <text x="688" y="216" text-anchor="middle" font-size="11" fill="#94a3b8">plaintext or re-encrypt</text>

  <line x1="506" y1="202" x2="612" y2="202" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="506" y1="276" x2="612" y2="216" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="506" y1="350" x2="612" y2="222" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <text x="400" y="394" text-anchor="middle" font-size="11" fill="#94a3b8">Any node can decrypt any ticket: resumption survives the load balancer</text>
</svg>
