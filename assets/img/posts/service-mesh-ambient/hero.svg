<svg xmlns="http://www.w3.org/2000/svg" width="800" viewBox="0 0 800 400" font-family="system-ui, sans-serif">
  <rect width="800" height="400" fill="#f8fafc"/>
  <rect x="0" y="0" width="400" height="400" fill="#eef2ff"/>

  <!-- Divider -->
  <line x1="400" y1="32" x2="400" y2="368" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4 5"/>

  <!-- ============ LEFT: Sidecar per pod ============ -->
  <text x="32" y="44" font-size="17" font-weight="700" fill="#312e81">Sidecar per pod</text>
  <text x="32" y="64" font-size="12" fill="#64748b">One Envoy in every pod</text>

  <!-- Node label -->
  <rect x="28" y="84" width="344" height="276" rx="10" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="40" y="104" font-size="11" font-weight="600" fill="#64748b">NODE</text>

  <!-- Pod 1 -->
  <rect x="48" y="120" width="148" height="100" rx="8" fill="#ffffff" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="60" y="138" font-size="10" font-weight="600" fill="#64748b">POD</text>
  <rect x="60" y="146" width="56" height="56" rx="6" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="88" y="178" font-size="11" font-weight="600" fill="#4f46e5" text-anchor="middle">app</text>
  <rect x="128" y="146" width="56" height="56" rx="6" fill="#4f46e5"/>
  <text x="156" y="171" font-size="10" font-weight="700" fill="#ffffff" text-anchor="middle">Envoy</text>
  <text x="156" y="186" font-size="9" fill="#c7d2fe" text-anchor="middle">sidecar</text>

  <!-- Pod 2 -->
  <rect x="204" y="120" width="148" height="100" rx="8" fill="#ffffff" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="216" y="138" font-size="10" font-weight="600" fill="#64748b">POD</text>
  <rect x="216" y="146" width="56" height="56" rx="6" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="244" y="178" font-size="11" font-weight="600" fill="#4f46e5" text-anchor="middle">app</text>
  <rect x="284" y="146" width="56" height="56" rx="6" fill="#4f46e5"/>
  <text x="312" y="171" font-size="10" font-weight="700" fill="#ffffff" text-anchor="middle">Envoy</text>
  <text x="312" y="186" font-size="9" fill="#c7d2fe" text-anchor="middle">sidecar</text>

  <!-- Pod 3 -->
  <rect x="48" y="232" width="148" height="100" rx="8" fill="#ffffff" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="60" y="250" font-size="10" font-weight="600" fill="#64748b">POD</text>
  <rect x="60" y="258" width="56" height="56" rx="6" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="88" y="290" font-size="11" font-weight="600" fill="#4f46e5" text-anchor="middle">app</text>
  <rect x="128" y="258" width="56" height="56" rx="6" fill="#4f46e5"/>
  <text x="156" y="283" font-size="10" font-weight="700" fill="#ffffff" text-anchor="middle">Envoy</text>
  <text x="156" y="298" font-size="9" fill="#c7d2fe" text-anchor="middle">sidecar</text>

  <!-- Pod 4 -->
  <rect x="204" y="232" width="148" height="100" rx="8" fill="#ffffff" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="216" y="250" font-size="10" font-weight="600" fill="#64748b">POD</text>
  <rect x="216" y="258" width="56" height="56" rx="6" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="244" y="290" font-size="11" font-weight="600" fill="#4f46e5" text-anchor="middle">app</text>
  <rect x="284" y="258" width="56" height="56" rx="6" fill="#4f46e5"/>
  <text x="312" y="283" font-size="10" font-weight="700" fill="#ffffff" text-anchor="middle">Envoy</text>
  <text x="312" y="298" font-size="9" fill="#c7d2fe" text-anchor="middle">sidecar</text>

  <text x="200" y="352" font-size="11" fill="#64748b" text-anchor="middle">4 pods = 4 proxies</text>

  <!-- ============ RIGHT: Ambient ============ -->
  <text x="432" y="44" font-size="17" font-weight="700" fill="#312e81">Ambient mesh</text>
  <text x="432" y="64" font-size="12" fill="#64748b">Per-node ztunnel + optional waypoint</text>

  <!-- Node label -->
  <rect x="428" y="84" width="344" height="276" rx="10" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="440" y="104" font-size="11" font-weight="600" fill="#64748b">NODE</text>

  <!-- Bare pods -->
  <rect x="448" y="120" width="68" height="64" rx="8" fill="#ffffff" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="482" y="156" font-size="11" font-weight="600" fill="#4f46e5" text-anchor="middle">app</text>
  <rect x="524" y="120" width="68" height="64" rx="8" fill="#ffffff" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="558" y="156" font-size="11" font-weight="600" fill="#4f46e5" text-anchor="middle">app</text>
  <rect x="448" y="196" width="68" height="64" rx="8" fill="#ffffff" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="482" y="232" font-size="11" font-weight="600" fill="#4f46e5" text-anchor="middle">app</text>
  <rect x="524" y="196" width="68" height="64" rx="8" fill="#ffffff" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="558" y="232" font-size="11" font-weight="600" fill="#4f46e5" text-anchor="middle">app</text>

  <!-- ztunnel (per node, L4) -->
  <rect x="448" y="296" width="144" height="48" rx="8" fill="#22c55e"/>
  <text x="520" y="318" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">ztunnel</text>
  <text x="520" y="334" font-size="9" fill="#dcfce7" text-anchor="middle">L4 mTLS, per node</text>

  <!-- connectors pods -> ztunnel -->
  <line x1="482" y1="184" x2="490" y2="296" stroke="#22c55e" stroke-width="1.5"/>
  <line x1="558" y1="184" x2="540" y2="296" stroke="#22c55e" stroke-width="1.5"/>
  <line x1="482" y1="260" x2="500" y2="296" stroke="#22c55e" stroke-width="1.5"/>
  <line x1="558" y1="260" x2="548" y2="296" stroke="#22c55e" stroke-width="1.5"/>

  <!-- waypoint (optional, L7) -->
  <rect x="612" y="148" width="140" height="92" rx="8" fill="#4f46e5"/>
  <text x="682" y="184" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">waypoint</text>
  <text x="682" y="201" font-size="9" fill="#c7d2fe" text-anchor="middle">Envoy, L7</text>
  <text x="682" y="216" font-size="9" fill="#c7d2fe" text-anchor="middle">only where</text>
  <text x="682" y="229" font-size="9" fill="#c7d2fe" text-anchor="middle">needed</text>
  <line x1="592" y1="200" x2="612" y2="194" stroke="#4f46e5" stroke-width="1.5" stroke-dasharray="3 3"/>

  <text x="600" y="352" font-size="11" fill="#64748b" text-anchor="middle">4 pods = 1 ztunnel (+ shared L7)</text>
</svg>
