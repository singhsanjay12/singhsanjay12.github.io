<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="400" fill="#f8fafc"/>

  <text x="400" y="38" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">Cache Invalidation: Closing the Staleness Window</text>

  <!-- Source of truth -->
  <rect x="40" y="92" width="150" height="72" rx="10" fill="#312e81"/>
  <text x="115" y="123" text-anchor="middle" font-size="14" font-weight="700" fill="#eef2ff">Source of Truth</text>
  <text x="115" y="144" text-anchor="middle" font-size="12" fill="#c7d2fe">write lands here</text>

  <!-- Write arrow -->
  <line x1="190" y1="128" x2="262" y2="128" stroke="#4f46e5" stroke-width="3" marker-end="url(#arrowI)"/>
  <text x="226" y="118" text-anchor="middle" font-size="11" font-weight="600" fill="#4f46e5">write</text>

  <!-- Staleness window band -->
  <rect x="266" y="78" width="320" height="244" rx="12" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="426" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="#4f46e5">The Staleness Window</text>

  <!-- Cache nodes serving stale -->
  <g>
    <rect x="290" y="118" width="120" height="56" rx="9" fill="#ffffff" stroke="#ef4444" stroke-width="2"/>
    <text x="350" y="142" text-anchor="middle" font-size="13" font-weight="700" fill="#1e293b">Cache Node A</text>
    <text x="350" y="160" text-anchor="middle" font-size="11" fill="#ef4444">serving stale</text>
  </g>
  <g>
    <rect x="442" y="118" width="120" height="56" rx="9" fill="#ffffff" stroke="#ef4444" stroke-width="2"/>
    <text x="502" y="142" text-anchor="middle" font-size="13" font-weight="700" fill="#1e293b">Cache Node B</text>
    <text x="502" y="160" text-anchor="middle" font-size="11" fill="#ef4444">serving stale</text>
  </g>
  <g>
    <rect x="366" y="196" width="120" height="56" rx="9" fill="#ffffff" stroke="#ef4444" stroke-width="2"/>
    <text x="426" y="220" text-anchor="middle" font-size="13" font-weight="700" fill="#1e293b">Cache Node C</text>
    <text x="426" y="238" text-anchor="middle" font-size="11" fill="#ef4444">serving stale</text>
  </g>

  <text x="426" y="290" text-anchor="middle" font-size="11" fill="#64748b">readers here see the old value</text>
  <text x="426" y="308" text-anchor="middle" font-size="11" fill="#64748b">until the window closes</text>

  <!-- Two ways to close the window -->
  <!-- TTL expiry -->
  <rect x="612" y="100" width="160" height="92" rx="10" fill="#ffffff" stroke="#6366f1" stroke-width="2"/>
  <circle cx="642" cy="130" r="11" fill="none" stroke="#6366f1" stroke-width="2.5"/>
  <line x1="642" y1="130" x2="642" y2="123" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="642" y1="130" x2="647" y2="133" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round"/>
  <text x="690" y="127" text-anchor="middle" font-size="13" font-weight="700" fill="#312e81">TTL Expiry</text>
  <text x="692" y="153" text-anchor="middle" font-size="10.5" fill="#64748b">bounded, self-healing</text>
  <text x="692" y="170" text-anchor="middle" font-size="10.5" fill="#64748b">no path to keep alive</text>
  <text x="692" y="186" text-anchor="middle" font-size="10.5" fill="#22c55e">converges on its own</text>

  <!-- Event-driven purge -->
  <rect x="612" y="208" width="160" height="92" rx="10" fill="#ffffff" stroke="#22c55e" stroke-width="2"/>
  <path d="M634 234 l16 16 M650 234 l-16 16" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round"/>
  <text x="694" y="237" text-anchor="middle" font-size="13" font-weight="700" fill="#312e81">Event Purge</text>
  <text x="692" y="262" text-anchor="middle" font-size="10.5" fill="#64748b">fresh in milliseconds</text>
  <text x="692" y="279" text-anchor="middle" font-size="10.5" fill="#64748b">needs a reliable path</text>
  <text x="692" y="295" text-anchor="middle" font-size="10.5" fill="#ef4444">racy if lost / reordered</text>

  <!-- arrows from window to the two closers -->
  <line x1="586" y1="146" x2="608" y2="146" stroke="#94a3b8" stroke-width="2.5" stroke-dasharray="5 4" marker-end="url(#arrowG)"/>
  <line x1="586" y1="254" x2="608" y2="254" stroke="#94a3b8" stroke-width="2.5" stroke-dasharray="5 4" marker-end="url(#arrowG)"/>

  <!-- bottom takeaway -->
  <rect x="40" y="346" width="720" height="38" rx="9" fill="#312e81"/>
  <text x="400" y="370" text-anchor="middle" font-size="13" font-weight="600" fill="#eef2ff">Short TTL plus purge as a backstop: fast convergence, with a bounded floor when the purge fails</text>

  <defs>
    <marker id="arrowI" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L9 4.5 L0 9 z" fill="#4f46e5"/>
    </marker>
    <marker id="arrowG" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L9 4.5 L0 9 z" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>
