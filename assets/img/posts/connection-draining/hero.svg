<svg xmlns="http://www.w3.org/2000/svg" width="800" viewBox="0 0 800 400" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="400" fill="#f8fafc"/>
  <rect x="0" y="0" width="800" height="400" fill="#eef2ff" opacity="0.5"/>

  <text x="400" y="40" text-anchor="middle" font-size="20" font-weight="700" fill="#312e81">Connection Draining During a Deploy</text>
  <text x="400" y="62" text-anchor="middle" font-size="13" fill="#64748b">A pod leaves the EndpointSlice, stops new traffic, and drains in-flight requests before exit</text>

  <!-- Load balancer -->
  <rect x="40" y="150" width="130" height="100" rx="10" fill="#4f46e5"/>
  <text x="105" y="195" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Load</text>
  <text x="105" y="214" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Balancer</text>
  <text x="105" y="234" text-anchor="middle" font-size="11" fill="#c7d2fe">routes by EndpointSlice</text>

  <!-- EndpointSlice pool -->
  <rect x="250" y="95" width="220" height="240" rx="12" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="360" y="120" text-anchor="middle" font-size="13" font-weight="700" fill="#312e81">EndpointSlice pool</text>

  <!-- Healthy pod A -->
  <rect x="270" y="140" width="180" height="50" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <circle cx="298" cy="165" r="9" fill="#22c55e"/>
  <text x="320" y="162" font-size="13" font-weight="600" fill="#166534">pod-1</text>
  <text x="320" y="179" font-size="11" fill="#15803d">Ready · receiving new traffic</text>

  <!-- Healthy pod B -->
  <rect x="270" y="200" width="180" height="50" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <circle cx="298" cy="225" r="9" fill="#22c55e"/>
  <text x="320" y="222" font-size="13" font-weight="600" fill="#166534">pod-2</text>
  <text x="320" y="239" font-size="11" fill="#15803d">Ready · receiving new traffic</text>

  <!-- Draining pod C (leaving) -->
  <rect x="270" y="262" width="180" height="56" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2" stroke-dasharray="5 3"/>
  <circle cx="298" cy="290" r="9" fill="#ef4444"/>
  <text x="320" y="285" font-size="13" font-weight="600" fill="#991b1b">pod-3</text>
  <text x="320" y="302" font-size="11" fill="#b91c1c">NotReady · leaving pool</text>

  <!-- LB to pool arrows: green to ready, dashed-out to draining -->
  <line x1="170" y1="180" x2="262" y2="165" stroke="#22c55e" stroke-width="2.5" marker-end="url(#green)"/>
  <line x1="170" y1="210" x2="262" y2="225" stroke="#22c55e" stroke-width="2.5" marker-end="url(#green)"/>
  <line x1="170" y1="240" x2="262" y2="288" stroke="#ef4444" stroke-width="2" stroke-dasharray="5 4" opacity="0.5"/>
  <text x="190" y="268" font-size="10" fill="#ef4444" font-weight="600">no new traffic</text>

  <!-- Draining pod detail panel on the right -->
  <rect x="520" y="120" width="250" height="200" rx="12" fill="#1e293b"/>
  <text x="645" y="148" text-anchor="middle" font-size="13" font-weight="700" fill="#e2e8f0">Draining pod-3</text>

  <!-- in-flight requests draining -->
  <circle cx="548" cy="180" r="7" fill="#6366f1"/>
  <text x="566" y="185" font-size="12" fill="#cbd5e1">in-flight request finishing</text>
  <circle cx="548" cy="210" r="7" fill="#6366f1"/>
  <text x="566" y="215" font-size="12" fill="#cbd5e1">in-flight request finishing</text>

  <!-- drain timer bar -->
  <text x="540" y="248" font-size="11" fill="#94a3b8">drain timer</text>
  <rect x="540" y="256" width="200" height="12" rx="6" fill="#312e81"/>
  <rect x="540" y="256" width="120" height="12" rx="6" fill="#6366f1"/>

  <text x="540" y="294" font-size="11" fill="#f87171">SIGTERM &#8594; drain &#8594; exit</text>
  <text x="540" y="310" font-size="10" fill="#64748b">GOAWAY / Connection: close for keepalive</text>

  <!-- arrow from draining pod to detail -->
  <line x1="450" y1="290" x2="518" y2="220" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#slate)"/>

  <!-- bottom ordering note -->
  <text x="400" y="375" text-anchor="middle" font-size="11" fill="#64748b">NotReady, then leave EndpointSlice, then drain in-flight work, then exit</text>

  <defs>
    <marker id="green" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#22c55e"/>
    </marker>
    <marker id="slate" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>
