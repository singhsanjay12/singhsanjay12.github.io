<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400" role="img" aria-label="On the left, a single overloaded Ingress object stuffed with vendor-specific annotations. On the right, the role-split Gateway API: an infra-owned GatewayClass and Gateway, with app-owned HTTPRoutes attached.">
  <defs>
    <linearGradient id="igbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eef2ff"/>
      <stop offset="1" stop-color="#f8fafc"/>
    </linearGradient>
    <filter id="igshadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.12"/>
    </filter>
    <marker id="igarrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0 0 L7 3 L0 6 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="800" height="400" fill="url(#igbg)"/>
  <text x="400" y="36" font-family="system-ui,sans-serif" font-size="21" font-weight="800" fill="#1e293b" text-anchor="middle">Ingress vs Gateway API</text>

  <line x1="400" y1="62" x2="400" y2="372" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4 5"/>

  <!-- LEFT: overloaded Ingress -->
  <text x="200" y="80" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#64748b" text-anchor="middle">One object, everything bolted on</text>

  <g font-family="system-ui,sans-serif">
    <rect x="70" y="96" width="260" height="250" rx="12" fill="#ffffff" stroke="#94a3b8" stroke-width="2.5" filter="url(#igshadow)"/>
    <text x="200" y="126" font-size="15" font-weight="800" fill="#1e293b" text-anchor="middle">Ingress</text>
    <text x="200" y="146" font-size="10.5" fill="#64748b" text-anchor="middle">host + path routing (the thin part)</text>

    <rect x="92" y="162" width="216" height="170" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5" stroke-dasharray="5 4"/>
    <text x="200" y="182" font-size="11" font-weight="700" fill="#b91c1c" text-anchor="middle">vendor annotations (not portable)</text>
    <text x="200" y="204" font-size="10" fill="#7f1d1d" text-anchor="middle">nginx.ingress.../rewrite-target</text>
    <text x="200" y="222" font-size="10" fill="#7f1d1d" text-anchor="middle">traefik.ingress.../middlewares</text>
    <text x="200" y="240" font-size="10" fill="#7f1d1d" text-anchor="middle">alb.ingress.../listen-ports</text>
    <text x="200" y="258" font-size="10" fill="#7f1d1d" text-anchor="middle">.../ssl-redirect, /canary-weight</text>
    <text x="200" y="276" font-size="10" fill="#7f1d1d" text-anchor="middle">.../proxy-body-size, /cors</text>
    <text x="200" y="300" font-size="10" font-style="italic" fill="#991b1b" text-anchor="middle">TLS, rewrites, splits, timeouts:</text>
    <text x="200" y="316" font-size="10" font-style="italic" fill="#991b1b" text-anchor="middle">all as strings, all per-vendor</text>
  </g>

  <!-- RIGHT: role-split Gateway API -->
  <text x="600" y="80" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#4338ca" text-anchor="middle">Typed roles, clean separation</text>

  <g font-family="system-ui,sans-serif">
    <!-- infra-owned -->
    <rect x="462" y="92" width="276" height="120" rx="10" fill="#eef2ff" stroke="#a5b4fc" stroke-width="1.5"/>
    <text x="600" y="110" font-size="10.5" font-weight="700" fill="#4338ca" text-anchor="middle">infra owner</text>

    <rect x="482" y="120" width="110" height="74" rx="9" fill="#ffffff" stroke="#4f46e5" stroke-width="2.5" filter="url(#igshadow)"/>
    <text x="537" y="148" font-size="12" font-weight="700" fill="#312e81" text-anchor="middle">GatewayClass</text>
    <text x="537" y="166" font-size="9.5" fill="#64748b" text-anchor="middle">which controller</text>
    <text x="537" y="180" font-size="9.5" fill="#94a3b8" text-anchor="middle">(envoy, etc.)</text>

    <rect x="608" y="120" width="110" height="74" rx="9" fill="#ffffff" stroke="#4f46e5" stroke-width="2.5" filter="url(#igshadow)"/>
    <text x="663" y="148" font-size="12" font-weight="700" fill="#312e81" text-anchor="middle">Gateway</text>
    <text x="663" y="166" font-size="9.5" fill="#64748b" text-anchor="middle">listeners, ports</text>
    <text x="663" y="180" font-size="9.5" fill="#94a3b8" text-anchor="middle">TLS, addresses</text>
  </g>
  <line x1="592" y1="157" x2="606" y2="157" stroke="#94a3b8" stroke-width="2" marker-end="url(#igarrow)"/>

  <g font-family="system-ui,sans-serif">
    <!-- app-owned -->
    <rect x="462" y="226" width="276" height="120" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
    <text x="600" y="244" font-size="10.5" font-weight="700" fill="#166534" text-anchor="middle">app owner</text>

    <rect x="478" y="256" width="118" height="72" rx="9" fill="#ffffff" stroke="#22c55e" stroke-width="2.5" filter="url(#igshadow)"/>
    <text x="537" y="282" font-size="12" font-weight="700" fill="#166534" text-anchor="middle">HTTPRoute</text>
    <text x="537" y="300" font-size="9.5" fill="#3f6212" text-anchor="middle">header / method</text>
    <text x="537" y="314" font-size="9.5" fill="#3f6212" text-anchor="middle">weights, mirror</text>

    <rect x="604" y="256" width="118" height="72" rx="9" fill="#ffffff" stroke="#22c55e" stroke-width="2.5" filter="url(#igshadow)"/>
    <text x="663" y="282" font-size="12" font-weight="700" fill="#166534" text-anchor="middle">GRPCRoute</text>
    <text x="663" y="300" font-size="9.5" fill="#3f6212" text-anchor="middle">TCPRoute too</text>
    <text x="663" y="314" font-size="9.5" fill="#3f6212" text-anchor="middle">L4 plus L7</text>
  </g>
  <line x1="663" y1="222" x2="663" y2="252" stroke="#94a3b8" stroke-width="2" marker-end="url(#igarrow)"/>
  <line x1="537" y1="222" x2="537" y2="252" stroke="#94a3b8" stroke-width="2" marker-end="url(#igarrow)"/>

  <text x="400" y="388" font-family="system-ui,sans-serif" font-size="12.5" fill="#475569" text-anchor="middle">Same routing, expressed as typed fields the infra owner and app owner each own.</text>
</svg>
