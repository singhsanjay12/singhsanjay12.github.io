<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="400" fill="#f8fafc"/>
  <rect x="0" y="0" width="800" height="400" fill="#eef2ff" opacity="0.5"/>

  <text x="400" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#312e81">Exactly-Once Effect</text>
  <text x="400" y="68" text-anchor="middle" font-size="13" fill="#64748b">At-least-once delivery + an idempotency key collapses retries into one effect</text>

  <!-- Client -->
  <rect x="48" y="150" width="150" height="100" rx="10" fill="#ffffff" stroke="#6366f1" stroke-width="2"/>
  <text x="123" y="186" text-anchor="middle" font-size="15" font-weight="600" fill="#312e81">Client</text>
  <text x="123" y="210" text-anchor="middle" font-size="11" fill="#64748b">retries on lost ack</text>
  <rect x="68" y="220" width="110" height="20" rx="5" fill="#eef2ff" stroke="#94a3b8" stroke-width="1"/>
  <text x="123" y="234" text-anchor="middle" font-size="10" fill="#4f46e5" font-family="monospace">key: ik_8a1f</text>

  <!-- Two arrows: same request arriving twice -->
  <line x1="198" y1="178" x2="320" y2="168" stroke="#ef4444" stroke-width="2.5" marker-end="url(#redhead)"/>
  <text x="258" y="158" text-anchor="middle" font-size="11" font-weight="600" fill="#ef4444">request</text>
  <line x1="198" y1="222" x2="320" y2="232" stroke="#ef4444" stroke-width="2.5" stroke-dasharray="6 4" marker-end="url(#redhead)"/>
  <text x="258" y="256" text-anchor="middle" font-size="11" font-weight="600" fill="#ef4444">retry (duplicate)</text>

  <!-- Server + dedupe -->
  <rect x="320" y="118" width="220" height="164" rx="10" fill="#ffffff" stroke="#4f46e5" stroke-width="2"/>
  <text x="430" y="146" text-anchor="middle" font-size="15" font-weight="600" fill="#312e81">Server</text>

  <!-- dedupe store -->
  <rect x="344" y="160" width="172" height="58" rx="8" fill="#312e81"/>
  <text x="430" y="182" text-anchor="middle" font-size="12" font-weight="600" fill="#e2e8f0">Dedupe Store</text>
  <text x="430" y="202" text-anchor="middle" font-size="10" fill="#94a3b8" font-family="monospace">ik_8a1f &#8594; done</text>

  <!-- atomic check-and-do -->
  <rect x="344" y="228" width="172" height="38" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="430" y="246" text-anchor="middle" font-size="11" font-weight="600" fill="#4f46e5">atomic check-and-do</text>
  <text x="430" y="259" text-anchor="middle" font-size="9" fill="#64748b">key + effect commit together</text>

  <!-- arrow to single effect -->
  <line x1="540" y1="200" x2="648" y2="200" stroke="#22c55e" stroke-width="3" marker-end="url(#greenhead)"/>
  <text x="594" y="190" text-anchor="middle" font-size="11" font-weight="600" fill="#22c55e">one effect</text>

  <!-- Single committed effect -->
  <rect x="648" y="150" width="104" height="100" rx="10" fill="#ffffff" stroke="#22c55e" stroke-width="2"/>
  <circle cx="700" cy="188" r="20" fill="#22c55e"/>
  <path d="M691 188 l6 6 l12 -14" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="700" y="226" text-anchor="middle" font-size="12" font-weight="600" fill="#312e81">charged</text>
  <text x="700" y="242" text-anchor="middle" font-size="10" fill="#64748b">once</text>

  <!-- bottom note -->
  <text x="400" y="332" text-anchor="middle" font-size="12" fill="#64748b">Two deliveries in, one effect out: the second retry matches the stored key and is dropped.</text>
  <text x="400" y="360" text-anchor="middle" font-size="11" fill="#94a3b8">Delivery is at-least-once. The effect is effectively-once.</text>

  <defs>
    <marker id="redhead" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L9 4.5 L0 9 z" fill="#ef4444"/>
    </marker>
    <marker id="greenhead" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L9 4.5 L0 9 z" fill="#22c55e"/>
    </marker>
  </defs>
</svg>
