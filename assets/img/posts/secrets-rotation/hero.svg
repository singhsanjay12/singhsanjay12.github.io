<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400" role="img" aria-label="A secrets manager issuing a short-lived dynamic credential to an attested workload, then rotating it with two overlapping leases so the new secret is live before the old one is revoked">
  <defs>
    <linearGradient id="secbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eef2ff"/>
      <stop offset="1" stop-color="#f8fafc"/>
    </linearGradient>
    <filter id="secshadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.12"/>
    </filter>
    <marker id="secarrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0 0 L7 3 L0 6 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="800" height="400" fill="url(#secbg)"/>
  <text x="400" y="38" font-family="system-ui,sans-serif" font-size="21" font-weight="800" fill="#1e293b" text-anchor="middle">Dynamic Secrets and Rotation Without Downtime</text>

  <!-- secrets manager -->
  <g font-family="system-ui,sans-serif">
    <rect x="40" y="120" width="150" height="110" rx="12" fill="#ffffff" stroke="#4f46e5" stroke-width="2.5" filter="url(#secshadow)"/>
    <text x="115" y="152" font-size="14" font-weight="700" fill="#312e81" text-anchor="middle">Secrets Manager</text>
    <text x="115" y="172" font-size="10.5" fill="#64748b" text-anchor="middle">Vault</text>
    <text x="115" y="194" font-size="10" fill="#64748b" text-anchor="middle">mints on demand</text>
    <text x="115" y="210" font-size="10" fill="#64748b" text-anchor="middle">scoped + short TTL</text>
  </g>

  <!-- workload identity / attestation -->
  <g font-family="system-ui,sans-serif">
    <rect x="40" y="278" width="150" height="64" rx="10" fill="#ffffff" stroke="#6366f1" stroke-width="2" stroke-dasharray="5 4" filter="url(#secshadow)"/>
    <text x="115" y="304" font-size="12" font-weight="700" fill="#4338ca" text-anchor="middle">Workload Identity</text>
    <text x="115" y="324" font-size="10" fill="#6366f1" text-anchor="middle">SPIFFE attestation</text>
  </g>
  <line x1="115" y1="278" x2="115" y2="234" stroke="#c7d2fe" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#secarrow)"/>
  <text x="200" y="262" font-size="9.5" font-family="system-ui,sans-serif" fill="#64748b" text-anchor="start">proves who it is</text>

  <!-- workload -->
  <g font-family="system-ui,sans-serif">
    <rect x="320" y="150" width="150" height="100" rx="12" fill="#ffffff" stroke="#1e293b" stroke-width="2.5" filter="url(#secshadow)"/>
    <text x="395" y="184" font-size="14" font-weight="700" fill="#1e293b" text-anchor="middle">Workload</text>
    <text x="395" y="206" font-size="10.5" fill="#64748b" text-anchor="middle">injected at runtime</text>
    <text x="395" y="222" font-size="10.5" fill="#64748b" text-anchor="middle">never baked in image</text>
  </g>
  <line x1="190" y1="178" x2="316" y2="178" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#secarrow)"/>
  <text x="253" y="168" font-size="9.5" font-family="system-ui,sans-serif" fill="#64748b" text-anchor="middle">lease (5 min)</text>

  <!-- protected resource -->
  <g font-family="system-ui,sans-serif">
    <rect x="610" y="150" width="150" height="100" rx="12" fill="#ffffff" stroke="#22c55e" stroke-width="2.5" filter="url(#secshadow)"/>
    <text x="685" y="184" font-size="14" font-weight="700" fill="#166534" text-anchor="middle">Database</text>
    <text x="685" y="206" font-size="10.5" fill="#3f6212" text-anchor="middle">accepts the lease</text>
    <text x="685" y="222" font-size="10.5" fill="#3f6212" text-anchor="middle">while it is valid</text>
  </g>
  <line x1="470" y1="200" x2="606" y2="200" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#secarrow)"/>
  <text x="538" y="190" font-size="9.5" font-family="system-ui,sans-serif" fill="#64748b" text-anchor="middle">scoped credential</text>

  <!-- overlapping validity timeline -->
  <g font-family="system-ui,sans-serif">
    <text x="400" y="300" font-size="11" font-weight="700" fill="#475569" text-anchor="middle">Rotation: overlapping leases, no gap</text>
    <rect x="270" y="312" width="170" height="20" rx="5" fill="#c7d2fe" stroke="#6366f1" stroke-width="1.5"/>
    <text x="355" y="326" font-size="10" fill="#312e81" text-anchor="middle">old lease (still valid)</text>
    <rect x="380" y="338" width="170" height="20" rx="5" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
    <text x="465" y="352" font-size="10" fill="#166534" text-anchor="middle">new lease (issued early)</text>
    <line x1="465" y1="308" x2="465" y2="362" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text x="465" y="306" font-size="9" fill="#ef4444" text-anchor="middle">cutover</text>
  </g>
</svg>
