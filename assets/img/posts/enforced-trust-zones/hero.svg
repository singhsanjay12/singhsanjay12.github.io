<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400" font-family="system-ui, sans-serif">
  <rect width="800" height="400" fill="#f8fafc"/>

  <!-- ===================== LEFT: FLAT NETWORK ===================== -->
  <rect x="24" y="48" width="356" height="304" rx="12" fill="#eef2ff" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="40" y="76" font-size="15" font-weight="700" fill="#1e293b">Flat network</text>
  <text x="40" y="94" font-size="11" fill="#64748b">one host falls, everything is reachable</text>

  <!-- compromised host -->
  <rect x="52" y="118" width="92" height="40" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="98" y="138" font-size="11" font-weight="700" fill="#b91c1c" text-anchor="middle">compromised</text>
  <text x="98" y="151" font-size="10" fill="#b91c1c" text-anchor="middle">web-01</text>

  <!-- other hosts -->
  <rect x="244" y="116" width="104" height="34" rx="6" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="296" y="137" font-size="10" fill="#1e293b" text-anchor="middle">database</text>

  <rect x="244" y="184" width="104" height="34" rx="6" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="296" y="205" font-size="10" fill="#1e293b" text-anchor="middle">cache</text>

  <rect x="244" y="252" width="104" height="34" rx="6" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="296" y="273" font-size="10" fill="#1e293b" text-anchor="middle">secrets</text>

  <rect x="56" y="252" width="104" height="34" rx="6" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="108" y="273" font-size="10" fill="#1e293b" text-anchor="middle">admin</text>

  <!-- lateral movement arrows (red) -->
  <g stroke="#ef4444" stroke-width="2" fill="none" marker-end="url(#redArrow)">
    <path d="M146 134 L240 133"/>
    <path d="M120 158 C150 195, 200 200, 240 201"/>
    <path d="M120 158 C150 245, 200 268, 240 268"/>
    <path d="M108 158 L108 248"/>
  </g>
  <text x="190" y="332" font-size="10.5" fill="#b91c1c" text-anchor="middle">lateral movement: total reach</text>

  <!-- ===================== RIGHT: TRUST ZONES ===================== -->
  <text x="420" y="76" font-size="15" font-weight="700" fill="#1e293b">Enforced trust zones</text>
  <text x="420" y="94" font-size="11" fill="#64748b">NACL boundaries + edge control zone</text>

  <!-- edge control zone (center column) -->
  <rect x="540" y="120" width="92" height="172" rx="10" fill="#312e81" stroke="#4f46e5" stroke-width="2"/>
  <text x="586" y="146" font-size="10.5" font-weight="700" fill="#c7d2fe" text-anchor="middle">edge</text>
  <text x="586" y="160" font-size="10.5" font-weight="700" fill="#c7d2fe" text-anchor="middle">control</text>
  <text x="586" y="174" font-size="10.5" font-weight="700" fill="#c7d2fe" text-anchor="middle">zone</text>
  <text x="586" y="208" font-size="9" fill="#a5b4fc" text-anchor="middle">terminate</text>
  <text x="586" y="222" font-size="9" fill="#a5b4fc" text-anchor="middle">+ policy +</text>
  <text x="586" y="236" font-size="9" fill="#a5b4fc" text-anchor="middle">re-originate</text>
  <text x="586" y="268" font-size="9" fill="#a5b4fc" text-anchor="middle">protocol</text>
  <text x="586" y="280" font-size="9" fill="#a5b4fc" text-anchor="middle">break</text>

  <!-- web zone -->
  <rect x="420" y="120" width="96" height="70" rx="9" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="468" y="146" font-size="11" font-weight="700" fill="#4f46e5" text-anchor="middle">web zone</text>
  <text x="468" y="162" font-size="9" fill="#64748b" text-anchor="middle">vlan 20</text>
  <text x="468" y="175" font-size="9" fill="#64748b" text-anchor="middle">10.20.0.0/22</text>

  <!-- app zone -->
  <rect x="420" y="220" width="96" height="70" rx="9" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="468" y="246" font-size="11" font-weight="700" fill="#4f46e5" text-anchor="middle">app zone</text>
  <text x="468" y="262" font-size="9" fill="#64748b" text-anchor="middle">vlan 30</text>
  <text x="468" y="275" font-size="9" fill="#64748b" text-anchor="middle">10.30.0.0/22</text>

  <!-- data zone -->
  <rect x="656" y="170" width="120" height="72" rx="9" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="716" y="196" font-size="11" font-weight="700" fill="#15803d" text-anchor="middle">data zone</text>
  <text x="716" y="212" font-size="9" fill="#64748b" text-anchor="middle">vlan 40</text>
  <text x="716" y="225" font-size="9" fill="#64748b" text-anchor="middle">10.40.0.0/24</text>

  <!-- allowed flows through edge (green) -->
  <g stroke="#22c55e" stroke-width="2.5" fill="none" marker-end="url(#greenArrow)">
    <path d="M516 155 L536 155"/>
    <path d="M516 255 L536 255"/>
    <path d="M632 205 L652 205"/>
  </g>

  <!-- NACL boundary markers -->
  <g>
    <rect x="522" y="146" width="14" height="18" rx="3" fill="#ffffff" stroke="#4f46e5" stroke-width="1.5"/>
    <text x="529" y="159" font-size="8" font-weight="700" fill="#4f46e5" text-anchor="middle">N</text>
    <rect x="522" y="246" width="14" height="18" rx="3" fill="#ffffff" stroke="#4f46e5" stroke-width="1.5"/>
    <text x="529" y="259" font-size="8" font-weight="700" fill="#4f46e5" text-anchor="middle">N</text>
    <rect x="636" y="196" width="14" height="18" rx="3" fill="#ffffff" stroke="#22c55e" stroke-width="1.5"/>
    <text x="643" y="209" font-size="8" font-weight="700" fill="#15803d" text-anchor="middle">N</text>
  </g>

  <!-- denied direct path (red, crossed) -->
  <path d="M520 130 C600 96, 660 110, 700 162" stroke="#ef4444" stroke-width="2" fill="none" stroke-dasharray="5 4"/>
  <g stroke="#ef4444" stroke-width="2.5">
    <line x1="601" y1="92" x2="615" y2="106"/>
    <line x1="615" y1="92" x2="601" y2="106"/>
  </g>
  <text x="608" y="330" font-size="10.5" fill="#15803d" text-anchor="middle">cross-zone denied by default; mediated at edge</text>

  <!-- legend -->
  <text x="420" y="372" font-size="9.5" fill="#64748b">N = NACL boundary + host firewall (default deny)</text>

  <defs>
    <marker id="redArrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0 0 L6 3 L0 6 z" fill="#ef4444"/>
    </marker>
    <marker id="greenArrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0 0 L6 3 L0 6 z" fill="#22c55e"/>
    </marker>
  </defs>
</svg>
