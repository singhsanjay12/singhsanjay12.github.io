<svg xmlns="http://www.w3.org/2000/svg" width="800" height="420" viewBox="0 0 800 420" role="img" aria-label="A client pod resolving a Service name through CoreDNS to a ClusterIP, which kube-proxy load-balances across backend pods listed in an EndpointSlice, with an optional bridge to an external service registry or mesh control plane">
  <defs>
    <linearGradient id="k8sbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eef2ff"/>
      <stop offset="1" stop-color="#f8fafc"/>
    </linearGradient>
    <filter id="k8sshadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.12"/>
    </filter>
    <marker id="k8sarrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0 0 L7 3 L0 6 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="800" height="420" fill="url(#k8sbg)"/>
  <text x="400" y="40" font-family="system-ui,sans-serif" font-size="21" font-weight="800" fill="#1e293b" text-anchor="middle">Service Discovery in Kubernetes</text>

  <!-- client pod -->
  <g font-family="system-ui,sans-serif">
    <rect x="36" y="150" width="120" height="74" rx="10" fill="#ffffff" stroke="#326ce5" stroke-width="2.5" filter="url(#k8sshadow)"/>
    <text x="96" y="180" font-size="14" font-weight="700" fill="#1e293b" text-anchor="middle">client pod</text>
    <text x="96" y="200" font-size="11" fill="#64748b" text-anchor="middle">"payments?"</text>
    <text x="96" y="215" font-size="10" fill="#94a3b8" text-anchor="middle">10.1.2.7</text>
  </g>

  <!-- CoreDNS -->
  <g font-family="system-ui,sans-serif">
    <rect x="210" y="150" width="120" height="74" rx="10" fill="#ffffff" stroke="#0ea5e9" stroke-width="2.5" filter="url(#k8sshadow)"/>
    <text x="270" y="182" font-size="14" font-weight="700" fill="#0c4a6e" text-anchor="middle">CoreDNS</text>
    <text x="270" y="202" font-size="10.5" fill="#64748b" text-anchor="middle">cluster DNS</text>
  </g>
  <line x1="156" y1="187" x2="206" y2="187" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#k8sarrow)"/>

  <!-- ClusterIP service -->
  <g font-family="system-ui,sans-serif">
    <rect x="384" y="150" width="130" height="74" rx="10" fill="#ffffff" stroke="#4f46e5" stroke-width="2.5" filter="url(#k8sshadow)"/>
    <text x="449" y="178" font-size="13.5" font-weight="700" fill="#312e81" text-anchor="middle">Service</text>
    <text x="449" y="196" font-size="10.5" fill="#64748b" text-anchor="middle">ClusterIP</text>
    <text x="449" y="211" font-size="10" fill="#94a3b8" text-anchor="middle">10.96.0.21</text>
  </g>
  <line x1="330" y1="187" x2="380" y2="187" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#k8sarrow)"/>
  <text x="356" y="178" font-family="system-ui,sans-serif" font-size="9" fill="#64748b" text-anchor="middle">A record</text>

  <!-- kube-proxy + backend pods -->
  <g font-family="system-ui,sans-serif">
    <text x="640" y="120" font-size="11" font-weight="600" fill="#475569" text-anchor="middle">kube-proxy → backend pods</text>
    <rect x="582" y="138" width="116" height="30" rx="7" fill="#ffffff" stroke="#22c55e" stroke-width="2" filter="url(#k8sshadow)"/>
    <text x="640" y="158" font-size="11" fill="#166534" text-anchor="middle">pod 10.1.4.3</text>
    <rect x="582" y="174" width="116" height="30" rx="7" fill="#ffffff" stroke="#22c55e" stroke-width="2" filter="url(#k8sshadow)"/>
    <text x="640" y="194" font-size="11" fill="#166534" text-anchor="middle">pod 10.1.5.8</text>
    <rect x="582" y="210" width="116" height="30" rx="7" fill="#ffffff" stroke="#22c55e" stroke-width="2" filter="url(#k8sshadow)"/>
    <text x="640" y="230" font-size="11" fill="#166534" text-anchor="middle">pod 10.1.6.2</text>
  </g>
  <line x1="514" y1="187" x2="578" y2="160" stroke="#94a3b8" stroke-width="2" marker-end="url(#k8sarrow)"/>
  <line x1="514" y1="189" x2="578" y2="189" stroke="#94a3b8" stroke-width="2" marker-end="url(#k8sarrow)"/>
  <line x1="514" y1="191" x2="578" y2="223" stroke="#94a3b8" stroke-width="2" marker-end="url(#k8sarrow)"/>

  <!-- EndpointSlice as the registry -->
  <g font-family="system-ui,sans-serif">
    <rect x="384" y="282" width="314" height="44" rx="9" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
    <text x="541" y="300" font-size="12" font-weight="700" fill="#166534" text-anchor="middle">EndpointSlice — the cluster's built-in registry</text>
    <text x="541" y="316" font-size="10" fill="#3f6212" text-anchor="middle">watched live: healthy pod IPs, ports, zones, readiness</text>
  </g>
  <line x1="541" y1="278" x2="449" y2="228" stroke="#86efac" stroke-width="2"/>
  <line x1="600" y1="278" x2="640" y2="244" stroke="#86efac" stroke-width="2"/>

  <!-- external registry / mesh bridge -->
  <g font-family="system-ui,sans-serif">
    <rect x="36" y="282" width="300" height="44" rx="9" fill="#ffffff" stroke="#a5b4fc" stroke-width="1.5" stroke-dasharray="5 4"/>
    <text x="186" y="300" font-size="12" font-weight="700" fill="#4338ca" text-anchor="middle">External registry / mesh xDS (optional)</text>
    <text x="186" y="316" font-size="10" fill="#6366f1" text-anchor="middle">Consul · Istio · multi-cluster · ExternalName</text>
  </g>
  <line x1="270" y1="278" x2="270" y2="226" stroke="#c7d2fe" stroke-width="2" stroke-dasharray="5 4"/>

  <text x="400" y="372" font-family="system-ui,sans-serif" font-size="13" fill="#475569" text-anchor="middle">A name resolves to a stable VIP; a control loop keeps the real endpoints behind it true.</text>
</svg>
