<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400" role="img" aria-label="A user session being continuously re-validated over time at RSA Conference 2026, with access cut the moment a signal turns risky">
  <defs>
    <linearGradient id="rsacbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eef2ff"/>
      <stop offset="1" stop-color="#f8fafc"/>
    </linearGradient>
    <filter id="rsacshadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="800" height="400" fill="url(#rsacbg)"/>

  <!-- Conference banner -->
  <rect x="40" y="34" width="232" height="40" rx="20" fill="#1e293b"/>
  <circle cx="64" cy="54" r="7" fill="#6366f1"/>
  <text x="84" y="59" font-family="system-ui,sans-serif" font-size="16" font-weight="700" fill="#f8fafc">RSA Conference 2026</text>

  <text x="40" y="128" font-family="system-ui,sans-serif" font-size="36" font-weight="800" fill="#1e293b">Beyond Zero Trust</text>
  <text x="40" y="162" font-family="system-ui,sans-serif" font-size="20" font-weight="600" fill="#4f46e5">Continuous Validation for Modern Enterprise Security</text>

  <!-- Session timeline -->
  <line x1="60" y1="280" x2="740" y2="280" stroke="#cbd5e1" stroke-width="3" stroke-linecap="round"/>

  <!-- Re-validation checkpoints (healthy) -->
  <g font-family="system-ui,sans-serif">
    <circle cx="150" cy="280" r="22" fill="#ffffff" stroke="#22c55e" stroke-width="3" filter="url(#rsacshadow)"/>
    <path d="M140 280 l7 7 l13 -15" fill="none" stroke="#22c55e" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>

    <circle cx="300" cy="280" r="22" fill="#ffffff" stroke="#22c55e" stroke-width="3" filter="url(#rsacshadow)"/>
    <path d="M290 280 l7 7 l13 -15" fill="none" stroke="#22c55e" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>

    <circle cx="450" cy="280" r="22" fill="#ffffff" stroke="#22c55e" stroke-width="3" filter="url(#rsacshadow)"/>
    <path d="M440 280 l7 7 l13 -15" fill="none" stroke="#22c55e" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Signal turns risky: access revoked -->
    <circle cx="600" cy="280" r="24" fill="#ffffff" stroke="#ef4444" stroke-width="3.5" filter="url(#rsacshadow)"/>
    <path d="M592 272 l16 16 M608 272 l-16 16" fill="none" stroke="#ef4444" stroke-width="3.5" stroke-linecap="round"/>

    <!-- Dimmed, cut-off endpoint -->
    <circle cx="730" cy="280" r="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="3" stroke-dasharray="4 4"/>
  </g>

  <!-- Signal feeds re-evaluated each checkpoint -->
  <g font-family="system-ui,sans-serif" font-size="12" fill="#64748b" text-anchor="middle">
    <text x="150" y="232">device posture</text>
    <text x="300" y="232">risk score</text>
    <text x="450" y="232">behavior</text>
    <text x="600" y="232" fill="#ef4444" font-weight="700">posture fails</text>
  </g>

  <text x="60" y="338" font-family="system-ui,sans-serif" font-size="14" fill="#475569">Authentication is a moment. Trust is a duration the session has to keep earning.</text>
</svg>
