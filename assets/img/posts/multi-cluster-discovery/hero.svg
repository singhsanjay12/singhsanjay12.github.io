<svg xmlns="http://www.w3.org/2000/svg" width="800" viewBox="0 0 800 400" font-family="system-ui, sans-serif">
  <rect width="800" height="400" fill="#f8fafc"/>

  <!-- Federation / GSLB layer -->
  <rect x="250" y="28" width="300" height="62" rx="10" fill="#312e81"/>
  <text x="400" y="54" text-anchor="middle" fill="#eef2ff" font-size="15" font-weight="700">Federation / GSLB Layer</text>
  <text x="400" y="74" text-anchor="middle" fill="#c7d2fe" font-size="11.5">ServiceImport · locality · failover</text>

  <!-- connectors from federation to clusters -->
  <path d="M310 90 L210 150" stroke="#6366f1" stroke-width="2.5" fill="none"/>
  <path d="M490 90 L590 150" stroke="#6366f1" stroke-width="2.5" fill="none"/>

  <!-- Cluster A -->
  <rect x="40" y="150" width="320" height="220" rx="12" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
  <text x="200" y="178" text-anchor="middle" fill="#312e81" font-size="14" font-weight="700">Cluster A  ·  us-east</text>
  <text x="200" y="197" text-anchor="middle" fill="#64748b" font-size="11">cluster.local</text>

  <rect x="70" y="214" width="120" height="56" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="130" y="238" text-anchor="middle" fill="#1e293b" font-size="11.5" font-weight="600">payments</text>
  <circle cx="92" cy="254" r="6" fill="#22c55e"/>
  <text x="135" y="258" text-anchor="middle" fill="#64748b" font-size="10">exported</text>

  <rect x="210" y="214" width="120" height="56" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="270" y="238" text-anchor="middle" fill="#1e293b" font-size="11.5" font-weight="600">checkout</text>
  <text x="270" y="258" text-anchor="middle" fill="#64748b" font-size="10">imported</text>

  <rect x="70" y="296" width="260" height="50" rx="8" fill="#1e293b"/>
  <text x="200" y="320" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="600">EndpointSlice · health-filtered</text>
  <text x="200" y="337" text-anchor="middle" fill="#94a3b8" font-size="10">10.1.7.4   10.1.7.9   10.1.8.2</text>

  <!-- Cluster B -->
  <rect x="440" y="150" width="320" height="220" rx="12" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
  <text x="600" y="178" text-anchor="middle" fill="#312e81" font-size="14" font-weight="700">Cluster B  ·  eu-west</text>
  <text x="600" y="197" text-anchor="middle" fill="#64748b" font-size="11">cluster.local</text>

  <rect x="470" y="214" width="120" height="56" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="530" y="238" text-anchor="middle" fill="#1e293b" font-size="11.5" font-weight="600">checkout</text>
  <circle cx="492" cy="254" r="6" fill="#22c55e"/>
  <text x="535" y="258" text-anchor="middle" fill="#64748b" font-size="10">exported</text>

  <rect x="610" y="214" width="120" height="56" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="670" y="238" text-anchor="middle" fill="#1e293b" font-size="11.5" font-weight="600">payments</text>
  <text x="670" y="258" text-anchor="middle" fill="#64748b" font-size="10">imported</text>

  <rect x="470" y="296" width="260" height="50" rx="8" fill="#1e293b"/>
  <text x="600" y="320" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="600">EndpointSlice · health-filtered</text>
  <text x="600" y="337" text-anchor="middle" fill="#94a3b8" font-size="10">10.2.4.3   10.2.4.8   10.2.5.1</text>

  <!-- cross-cluster sync arrow -->
  <path d="M360 245 L440 245" stroke="#22c55e" stroke-width="2.5" stroke-dasharray="6 5" fill="none"/>
  <path d="M440 245 L432 240 M440 245 L432 250" stroke="#22c55e" stroke-width="2.5" fill="none"/>
  <path d="M360 245 L368 240 M360 245 L368 250" stroke="#22c55e" stroke-width="2.5" fill="none"/>
  <text x="400" y="236" text-anchor="middle" fill="#16a34a" font-size="10" font-weight="600">endpoint sync</text>
</svg>
