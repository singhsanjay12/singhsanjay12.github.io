<svg xmlns="http://www.w3.org/2000/svg" width="800" viewBox="0 0 800 400" font-family="system-ui, sans-serif">
  <rect width="800" height="400" fill="#f8fafc"/>
  <rect x="0" y="0" width="800" height="400" fill="#eef2ff" opacity="0.5"/>

  <!-- Title -->
  <text x="40" y="48" font-size="22" font-weight="700" fill="#312e81">Consistent Hash Ring</text>
  <text x="40" y="72" font-size="13" fill="#64748b">Each key routes clockwise to the next node; virtual nodes smooth the load</text>

  <!-- Ring -->
  <g transform="translate(280,235)">
    <circle cx="0" cy="0" r="125" fill="none" stroke="#94a3b8" stroke-width="2" stroke-dasharray="3 5"/>

    <!-- Clockwise direction arrow -->
    <path d="M 118 -42 A 125 125 0 0 1 132 -2" fill="none" stroke="#6366f1" stroke-width="2.5" marker-end="url(#arrow)"/>

    <!-- Nodes (servers) on the ring -->
    <!-- s0 top -->
    <circle cx="0" cy="-125" r="13" fill="#4f46e5"/>
    <text x="0" y="-121" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">s0</text>
    <!-- s1 right-low -->
    <circle cx="108" cy="62" r="13" fill="#4f46e5"/>
    <text x="108" y="66" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">s1</text>
    <!-- s2 left-low -->
    <circle cx="-108" cy="62" r="13" fill="#4f46e5"/>
    <text x="-108" y="66" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">s2</text>

    <!-- Virtual nodes (smaller, indigo light) -->
    <circle cx="88" cy="-88" r="7" fill="#6366f1"/>
    <circle cx="125" cy="0" r="7" fill="#6366f1"/>
    <circle cx="44" cy="117" r="7" fill="#6366f1"/>
    <circle cx="-44" cy="117" r="7" fill="#6366f1"/>
    <circle cx="-125" cy="0" r="7" fill="#6366f1"/>
    <circle cx="-88" cy="-88" r="7" fill="#6366f1"/>

    <!-- Keys on the ring (green dots) with clockwise routing arrows to owner node -->
    <!-- key A near top-right, routes clockwise to s1 vnode at 125,0 -->
    <circle cx="118" cy="-42" r="5" fill="#22c55e"/>
    <text x="132" y="-42" font-size="11" fill="#1e293b">k1</text>

    <!-- key B lower-left, routes to s2 -->
    <circle cx="-118" cy="42" r="5" fill="#22c55e"/>
    <text x="-150" y="46" font-size="11" fill="#1e293b">k2</text>

    <!-- key C bottom, routes to s1 vnode -->
    <circle cx="0" cy="125" r="5" fill="#22c55e"/>
    <text x="-8" y="146" font-size="11" fill="#1e293b">k3</text>
  </g>

  <!-- Legend / side panel -->
  <g transform="translate(560,120)">
    <rect x="0" y="0" width="208" height="180" rx="10" fill="#ffffff" stroke="#c7d2fe" stroke-width="1.5"/>

    <circle cx="22" cy="30" r="9" fill="#4f46e5"/>
    <text x="42" y="34" font-size="13" fill="#1e293b" font-weight="600">server node</text>

    <circle cx="22" cy="64" r="6" fill="#6366f1"/>
    <text x="42" y="68" font-size="13" fill="#1e293b" font-weight="600">virtual node</text>

    <circle cx="22" cy="98" r="5" fill="#22c55e"/>
    <text x="42" y="102" font-size="13" fill="#1e293b" font-weight="600">key</text>

    <text x="18" y="138" font-size="12" fill="#64748b">add or remove a node:</text>
    <text x="18" y="158" font-size="12" fill="#312e81" font-weight="700">~1/N of keys move</text>
  </g>

  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#6366f1"/>
    </marker>
  </defs>
</svg>
