<svg xmlns="http://www.w3.org/2000/svg" width="800" viewBox="0 0 800 400" font-family="system-ui, sans-serif">
  <rect width="800" height="400" fill="#f8fafc"/>
  <rect x="0" y="0" width="800" height="400" fill="#eef2ff" opacity="0.5"/>

  <text x="400" y="40" text-anchor="middle" font-size="20" font-weight="700" fill="#312e81">Two clients, one lock, one fence</text>

  <!-- Client A: paused on GC -->
  <rect x="40" y="90" width="200" height="100" rx="12" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <text x="140" y="118" text-anchor="middle" font-size="15" font-weight="700" fill="#1e293b">Client A</text>
  <text x="140" y="140" text-anchor="middle" font-size="12" fill="#64748b">holds lock, token 33</text>
  <rect x="68" y="152" width="144" height="26" rx="6" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="140" y="170" text-anchor="middle" font-size="12" font-weight="600" fill="#ef4444">paused: GC pause</text>

  <!-- lock icon for A -->
  <g transform="translate(126,62)">
    <rect x="0" y="10" width="28" height="20" rx="4" fill="#6366f1"/>
    <path d="M5 10 v-5 a9 9 0 0 1 18 0 v5" fill="none" stroke="#4f46e5" stroke-width="3"/>
  </g>

  <!-- Client B: acquires after lease expiry -->
  <rect x="40" y="240" width="200" height="100" rx="12" fill="#ffffff" stroke="#22c55e" stroke-width="2"/>
  <text x="140" y="268" text-anchor="middle" font-size="15" font-weight="700" fill="#1e293b">Client B</text>
  <text x="140" y="290" text-anchor="middle" font-size="12" fill="#64748b">acquires after lease</text>
  <rect x="68" y="302" width="144" height="26" rx="6" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
  <text x="140" y="320" text-anchor="middle" font-size="12" font-weight="600" fill="#16a34a">writes with token 34</text>

  <!-- lock icon for B -->
  <g transform="translate(126,212)">
    <rect x="0" y="10" width="28" height="20" rx="4" fill="#22c55e"/>
    <path d="M5 10 v-5 a9 9 0 0 1 18 0 v5" fill="none" stroke="#16a34a" stroke-width="3"/>
  </g>

  <!-- Lock service -->
  <rect x="320" y="160" width="150" height="80" rx="12" fill="#312e81"/>
  <text x="395" y="190" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Lock service</text>
  <text x="395" y="212" text-anchor="middle" font-size="11" fill="#c7d2fe">issues tokens</text>
  <text x="395" y="228" text-anchor="middle" font-size="11" fill="#c7d2fe">33, 34, 35 ...</text>

  <!-- arrows from clients to lock service -->
  <line x1="240" y1="150" x2="318" y2="180" stroke="#94a3b8" stroke-width="2"/>
  <line x1="240" y1="280" x2="318" y2="220" stroke="#22c55e" stroke-width="2"/>

  <!-- Resource with fencing -->
  <rect x="560" y="120" width="200" height="160" rx="12" fill="#ffffff" stroke="#4f46e5" stroke-width="2.5"/>
  <text x="660" y="150" text-anchor="middle" font-size="15" font-weight="700" fill="#312e81">Resource</text>
  <text x="660" y="170" text-anchor="middle" font-size="12" fill="#64748b">high-water mark</text>
  <rect x="610" y="182" width="100" height="30" rx="6" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="660" y="202" text-anchor="middle" font-size="14" font-weight="700" fill="#4f46e5">token = 34</text>

  <line x1="600" y1="232" x2="720" y2="232" stroke="#e2e8f0" stroke-width="1"/>
  <text x="660" y="252" text-anchor="middle" font-size="12" fill="#16a34a">accept 34, advance</text>
  <text x="660" y="270" text-anchor="middle" font-size="12" fill="#ef4444">reject 33, stale</text>

  <!-- B accepted write -->
  <line x1="470" y1="210" x2="558" y2="220" stroke="#22c55e" stroke-width="2.5"/>
  <polygon points="558,220 548,214 549,226" fill="#22c55e"/>

  <!-- A stale write rejected -->
  <path d="M240 130 C 420 90, 540 100, 558 150" fill="none" stroke="#ef4444" stroke-width="2.5" stroke-dasharray="7 5"/>
  <polygon points="558,150 548,143 549,157" fill="#ef4444"/>
  <g transform="translate(400,96)">
    <circle cx="0" cy="0" r="13" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
    <line x1="-6" y1="-6" x2="6" y2="6" stroke="#ef4444" stroke-width="2.5"/>
    <line x1="6" y1="-6" x2="-6" y2="6" stroke="#ef4444" stroke-width="2.5"/>
  </g>
  <text x="400" y="78" text-anchor="middle" font-size="11" font-weight="600" fill="#ef4444">stale token 33 fenced out</text>

  <text x="400" y="384" text-anchor="middle" font-size="12" fill="#64748b">Safety comes from the resource rejecting stale tokens, not from the lease timing out correctly.</text>
</svg>
