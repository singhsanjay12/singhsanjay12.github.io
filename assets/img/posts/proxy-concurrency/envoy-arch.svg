<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -25 800 420" width="800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef2ff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="#c7d2fe" opacity="0.35"/>
    </pattern>
    <marker id="arr-v" viewBox="0 0 8 5" refX="7" refY="2.5" markerWidth="5" markerHeight="5" orient="auto">
      <polygon points="0,0 8,2.5 0,5" fill="#6366f1"/>
    </marker>
    <marker id="arr-x" viewBox="0 0 8 5" refX="7" refY="2.5" markerWidth="5" markerHeight="5" orient="auto">
      <polygon points="0,0 8,2.5 0,5" fill="#7dd3fc"/>
    </marker>
  </defs>

  <rect x="0" y="-25" width="800" height="420" fill="url(#bg)"/>
  <rect x="0" y="-25" width="800" height="420" fill="url(#dots)"/>

  <!-- Title -->
  <text x="400" y="10" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#1e293b" text-anchor="middle">Envoy — Thread-per-Core, Complete Worker Isolation</text>

  <!-- Incoming connections -->
  <text x="34" y="88" font-family="system-ui,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">clients</text>
  <circle cx="18" cy="102" r="4" fill="#4f8ef7"/>
  <circle cx="30" cy="102" r="4" fill="#4f8ef7"/>
  <circle cx="42" cy="102" r="4" fill="#4f8ef7"/>
  <line x1="52" y1="102" x2="95" y2="102" stroke="#4f8ef7" stroke-width="1.8" marker-end="url(#arr-v)"/>

  <!-- Listener Thread -->
  <rect x="99" y="75" width="155" height="56" rx="7" fill="#1e293b"/>
  <text x="176" y="96" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="white" text-anchor="middle">Listener Thread</text>
  <text x="176" y="111" font-family="system-ui,sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">accept · TLS handshake</text>
  <text x="176" y="124" font-family="system-ui,sans-serif" font-size="8" fill="#6366f1" text-anchor="middle">hash conn → worker</text>

  <!--
    Dispatch arrows from Listener Thread right edge (x=254) to each worker.
    W0 and W1 (left column x=330) get direct S-curves — no obstacles.
    W2 (right column top) routes ABOVE the worker grid (y < 37) to avoid crossing W0.
    W3 (right column bottom) routes BELOW the worker grid (y > 303) to avoid crossing W1.
  -->
  <!-- → W0 left-center (328, 101) -->
  <path d="M 254 95  C 284 95  284 101 328 101" fill="none" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arr-v)"/>
  <!-- → W1 left-center (328, 239) -->
  <path d="M 254 103 C 284 103 284 239 328 239" fill="none" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arr-v)"/>
  <!-- → W2 top-center: arc above grid, stays at y≤16 across x=254→498 -->
  <path d="M 254 90  C 254 16  498 16  498 37"  fill="none" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arr-v)"/>
  <!-- → W3 bottom-center: arc below grid, stays at y≥320 across x=254→498 -->
  <path d="M 254 111 C 254 320 498 320 498 303" fill="none" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arr-v)"/>

  <!--
    Worker boxes — 2×2 grid.
    Row 1: y=37–165 (height=128)  Row 2: y=175–303 (height=128)  Gap=10px → barrier at y=170
    Col 1: x=330–488              Col 2: x=498–656
  -->

  <!-- Worker 0 -->
  <rect x="330" y="37" width="158" height="128" rx="7" fill="white" stroke="#4f8ef7" stroke-width="1.8"/>
  <text x="409" y="56" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#1e293b" text-anchor="middle">Worker 0</text>
  <path d="M 370 76 A 12 12 0 1 1 383 89" fill="none" stroke="#4f8ef7" stroke-width="2" stroke-linecap="round"/>
  <polygon points="383,83 383,94 373,89" fill="#4f8ef7"/>
  <text x="409" y="78" font-family="system-ui,sans-serif" font-size="8" fill="#475569">libevent loop</text>
  <text x="409" y="92"  font-family="system-ui,sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">L4 · L7 filter chain</text>
  <text x="409" y="105" font-family="system-ui,sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">upstream conn pool</text>
  <text x="409" y="118" font-family="system-ui,sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">xDS config snapshot</text>
  <rect x="348" y="130" width="122" height="16" rx="8" fill="#eff6ff"/>
  <text x="409" y="142" font-family="system-ui,sans-serif" font-size="7.5" font-weight="600" fill="#4f8ef7" text-anchor="middle">5 conns · 0 shared state</text>

  <!-- Worker 1 — y shifted to 175 to open a 10px gap below row 1 -->
  <rect x="330" y="175" width="158" height="128" rx="7" fill="white" stroke="#4f8ef7" stroke-width="1.8"/>
  <text x="409" y="194" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#1e293b" text-anchor="middle">Worker 1</text>
  <path d="M 370 214 A 12 12 0 1 1 383 227" fill="none" stroke="#4f8ef7" stroke-width="2" stroke-linecap="round"/>
  <polygon points="383,221 383,232 373,227" fill="#4f8ef7"/>
  <text x="409" y="216" font-family="system-ui,sans-serif" font-size="8" fill="#475569">libevent loop</text>
  <text x="409" y="230" font-family="system-ui,sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">L4 · L7 filter chain</text>
  <text x="409" y="243" font-family="system-ui,sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">upstream conn pool</text>
  <text x="409" y="256" font-family="system-ui,sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">xDS config snapshot</text>
  <rect x="348" y="268" width="122" height="16" rx="8" fill="#eff6ff"/>
  <text x="409" y="280" font-family="system-ui,sans-serif" font-size="7.5" font-weight="600" fill="#4f8ef7" text-anchor="middle">8 conns · 0 shared state</text>

  <!-- Worker 2 -->
  <rect x="498" y="37" width="158" height="128" rx="7" fill="white" stroke="#4f8ef7" stroke-width="1.8"/>
  <text x="577" y="56" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#1e293b" text-anchor="middle">Worker 2</text>
  <path d="M 538 76 A 12 12 0 1 1 551 89" fill="none" stroke="#4f8ef7" stroke-width="2" stroke-linecap="round"/>
  <polygon points="551,83 551,94 541,89" fill="#4f8ef7"/>
  <text x="577" y="78" font-family="system-ui,sans-serif" font-size="8" fill="#475569">libevent loop</text>
  <text x="577" y="92"  font-family="system-ui,sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">L4 · L7 filter chain</text>
  <text x="577" y="105" font-family="system-ui,sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">upstream conn pool</text>
  <text x="577" y="118" font-family="system-ui,sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">xDS config snapshot</text>
  <rect x="516" y="130" width="122" height="16" rx="8" fill="#eff6ff"/>
  <text x="577" y="142" font-family="system-ui,sans-serif" font-size="7.5" font-weight="600" fill="#4f8ef7" text-anchor="middle">6 conns · 0 shared state</text>

  <!-- Worker 3 — y shifted to 175 -->
  <rect x="498" y="175" width="158" height="128" rx="7" fill="white" stroke="#4f8ef7" stroke-width="1.8"/>
  <text x="577" y="194" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#1e293b" text-anchor="middle">Worker 3</text>
  <path d="M 538 214 A 12 12 0 1 1 551 227" fill="none" stroke="#4f8ef7" stroke-width="2" stroke-linecap="round"/>
  <polygon points="551,221 551,232 541,227" fill="#4f8ef7"/>
  <text x="577" y="216" font-family="system-ui,sans-serif" font-size="8" fill="#475569">libevent loop</text>
  <text x="577" y="230" font-family="system-ui,sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">L4 · L7 filter chain</text>
  <text x="577" y="243" font-family="system-ui,sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">upstream conn pool</text>
  <text x="577" y="256" font-family="system-ui,sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">xDS config snapshot</text>
  <rect x="516" y="268" width="122" height="16" rx="8" fill="#eff6ff"/>
  <text x="577" y="280" font-family="system-ui,sans-serif" font-size="7.5" font-weight="600" fill="#4f8ef7" text-anchor="middle">4 conns · 0 shared state</text>

  <!-- NO SHARED STATE barriers -->
  <!-- Horizontal: y=170 is the centre of the 10px gap (165–175) between rows -->
  <line x1="332" y1="170" x2="654" y2="170" stroke="#e74c3c" stroke-width="2" stroke-dasharray="5 3"/>
  <rect x="394" y="162" width="136" height="16" rx="8" fill="#fef2f2"/>
  <text x="462" y="174" font-family="system-ui,sans-serif" font-size="8" font-weight="700" fill="#e74c3c" text-anchor="middle">NO SHARED STATE</text>
  <!-- Vertical: x=492 is the centre of the 10px gap (488–498) between columns -->
  <line x1="492" y1="38" x2="492" y2="301" stroke="#e74c3c" stroke-width="2" stroke-dasharray="5 3"/>

  <!-- xDS control plane -->
  <rect x="672" y="60" width="115" height="90" rx="7" fill="#f0f9ff" stroke="#7dd3fc" stroke-width="1.5"/>
  <text x="729" y="80"  font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#0369a1" text-anchor="middle">xDS Control</text>
  <text x="729" y="94"  font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#0369a1" text-anchor="middle">Plane</text>
  <line x1="679" y1="107" x2="762" y2="107" stroke="#7dd3fc" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="729" y="120" font-family="system-ui,sans-serif" font-size="8" fill="#0369a1" text-anchor="middle">routes · endpoints</text>
  <text x="729" y="133" font-family="system-ui,sans-serif" font-size="8" fill="#0369a1" text-anchor="middle">certs · timeouts</text>
  <text x="729" y="144" font-family="system-ui,sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">hot-push to each worker</text>

  <!--
    xDS arrows route from the xDS box BOTTOM to each worker RIGHT edge.
    W2 right edge: x=656, centre y=101.  W3 right edge: x=656, centre y=239.
    Paths curve down from xDS bottom then left to each worker's right side.
  -->
  <!-- xDS → W2 right-centre -->
  <path d="M 690 148 C 690 115 658 115 658 103" fill="none" stroke="#7dd3fc" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#arr-x)"/>
  <!-- xDS → W3 right-centre -->
  <path d="M 718 148 C 718 200 658 200 658 239" fill="none" stroke="#7dd3fc" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#arr-x)"/>
  <text x="729" y="165" font-family="system-ui,sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">↓ each worker</text>

  <!-- Config note -->
  <rect x="70" y="318" width="650" height="26" rx="6" fill="white" stroke="#e2e8f0" stroke-width="1.2"/>
  <text x="395" y="335" font-family="monospace,system-ui,sans-serif" font-size="8.5" fill="#475569" text-anchor="middle">--concurrency N  (default: hardware threads)  ·  config via xDS API or static bootstrap YAML</text>

  <!-- Caption -->
  <line x1="40" y1="356" x2="760" y2="356" stroke="#e2e8f0" stroke-width="1"/>
  <text x="400" y="370" font-family="Georgia,serif" font-size="12" font-weight="700" font-style="italic" fill="#1e293b" text-anchor="middle">Envoy workers are islands: each owns its connections, filter chain, and config snapshot. Nothing shared.</text>
  <text x="400" y="382" font-family="system-ui,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">xDS pushes config to each worker independently · red barriers = zero cross-worker communication</text>
</svg>
