<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -25 800 420" width="800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef2ff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="#c7d2fe" opacity="0.35"/>
    </pattern>
  </defs>

  <rect x="0" y="-25" width="800" height="420" fill="url(#bg)"/>
  <rect x="0" y="-25" width="800" height="420" fill="url(#dots)"/>

  <!-- Divider -->
  <line x1="400" y1="-20" x2="400" y2="350" stroke="#e2e8f0" stroke-width="1.5" stroke-dasharray="7 4"/>

  <!-- === LEFT: Thread-per-Connection === -->
  <text x="200" y="5" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#1e293b" text-anchor="middle">Thread-per-Connection</text>

  <!-- 6 connection+thread pairs -->
  <!-- Thread box: x=130, width=130, height=30 -->
  <!-- Connection line: (20, cy) to (130, cy) -->

  <!-- T1 -->
  <line x1="30" y1="40" x2="130" y2="40" stroke="#4f8ef7" stroke-width="1.8"/>
  <circle cx="80" cy="40" r="4" fill="#4f8ef7" stroke="white" stroke-width="1.5"/>
  <rect x="130" y="27" width="140" height="26" rx="4" fill="white" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="200" y="44" font-family="system-ui,sans-serif" font-size="10" fill="#475569" text-anchor="middle">Thread 1  ·  1 conn</text>

  <!-- T2 -->
  <line x1="30" y1="90" x2="130" y2="90" stroke="#4f8ef7" stroke-width="1.8"/>
  <circle cx="80" cy="90" r="4" fill="#4f8ef7" stroke="white" stroke-width="1.5"/>
  <rect x="130" y="77" width="140" height="26" rx="4" fill="white" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="200" y="94" font-family="system-ui,sans-serif" font-size="10" fill="#475569" text-anchor="middle">Thread 2  ·  1 conn</text>

  <!-- T3 -->
  <line x1="30" y1="140" x2="130" y2="140" stroke="#4f8ef7" stroke-width="1.8"/>
  <circle cx="80" cy="140" r="4" fill="#4f8ef7" stroke="white" stroke-width="1.5"/>
  <rect x="130" y="127" width="140" height="26" rx="4" fill="white" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="200" y="144" font-family="system-ui,sans-serif" font-size="10" fill="#475569" text-anchor="middle">Thread 3  ·  1 conn</text>

  <!-- T4 -->
  <line x1="30" y1="190" x2="130" y2="190" stroke="#4f8ef7" stroke-width="1.8"/>
  <circle cx="80" cy="190" r="4" fill="#4f8ef7" stroke="white" stroke-width="1.5"/>
  <rect x="130" y="177" width="140" height="26" rx="4" fill="white" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="200" y="194" font-family="system-ui,sans-serif" font-size="10" fill="#475569" text-anchor="middle">Thread 4  ·  1 conn</text>

  <!-- T5 -->
  <line x1="30" y1="240" x2="130" y2="240" stroke="#f97316" stroke-width="1.8"/>
  <circle cx="80" cy="240" r="4" fill="#f97316" stroke="white" stroke-width="1.5"/>
  <rect x="130" y="227" width="140" height="26" rx="4" fill="#fff7ed" stroke="#f97316" stroke-width="1.5"/>
  <text x="200" y="244" font-family="system-ui,sans-serif" font-size="10" fill="#c2410c" text-anchor="middle">Thread 5  · blocked</text>

  <!-- ellipsis -->
  <text x="200" y="275" font-family="system-ui,sans-serif" font-size="11" fill="#c7d2fe" text-anchor="middle">⋯  N threads</text>

  <!-- Memory / cost annotation -->
  <rect x="60" y="290" width="280" height="46" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.2"/>
  <text x="200" y="308" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#b91c1c" text-anchor="middle">Cost: N × ~1 MB stack memory</text>
  <text x="200" y="324" font-family="system-ui,sans-serif" font-size="9" fill="#ef4444" text-anchor="middle">OS context switches per request · blocking stalls all I/O on that thread</text>

  <!-- === RIGHT: Event Loop === -->
  <text x="600" y="5" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#1e293b" text-anchor="middle">Event Loop</text>

  <!-- Connections arriving at event loop -->
  <!-- Event loop box center at x=620, cy=165 -->
  <!-- 7 connections from x=420 at various y -->

  <line x1="420" y1="25"  x2="560" y2="155" stroke="#4f8ef7" stroke-width="1.5"/>
  <line x1="420" y1="68"  x2="560" y2="160" stroke="#4f8ef7" stroke-width="1.5"/>
  <line x1="420" y1="111" x2="560" y2="165" stroke="#4f8ef7" stroke-width="1.5"/>
  <line x1="420" y1="154" x2="560" y2="168" stroke="#cbd5e1" stroke-width="1.2" stroke-dasharray="5 4"/>
  <line x1="420" y1="197" x2="560" y2="170" stroke="#4f8ef7" stroke-width="1.5"/>
  <line x1="420" y1="240" x2="560" y2="172" stroke="#cbd5e1" stroke-width="1.2" stroke-dasharray="5 4"/>
  <line x1="420" y1="283" x2="560" y2="175" stroke="#4f8ef7" stroke-width="1.5"/>

  <!-- Tiny connection-source dots -->
  <circle cx="420" cy="25"  r="3.5" fill="#4f8ef7"/>
  <circle cx="420" cy="68"  r="3.5" fill="#4f8ef7"/>
  <circle cx="420" cy="111" r="3.5" fill="#4f8ef7"/>
  <circle cx="420" cy="154" r="3.5" fill="#cbd5e1"/>
  <circle cx="420" cy="197" r="3.5" fill="#4f8ef7"/>
  <circle cx="420" cy="240" r="3.5" fill="#cbd5e1"/>
  <circle cx="420" cy="283" r="3.5" fill="#4f8ef7"/>
  <text x="415" y="308" font-family="system-ui,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">⋯ thousands</text>

  <!-- Event loop box -->
  <rect x="560" y="140" width="120" height="60" rx="8" fill="#1e293b"/>
  <!-- Circular arrow symbol inside -->
  <path d="M 610 160 A 14 14 0 1 1 629 178" stroke="#6366f1" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <polygon points="629,172 629,184 618,178" fill="#6366f1"/>
  <text x="648" y="163" font-family="system-ui,sans-serif" font-size="8" fill="#94a3b8">epoll/</text>
  <text x="648" y="175" font-family="system-ui,sans-serif" font-size="8" fill="#94a3b8">kqueue</text>
  <text x="620" y="192" font-family="system-ui,sans-serif" font-size="9" font-weight="600" fill="white" text-anchor="middle">Event Loop</text>

  <!-- "Ready" events going back out (right side of loop box) -->
  <line x1="680" y1="158" x2="760" y2="158" stroke="#34d399" stroke-width="1.8"/>
  <line x1="680" y1="170" x2="760" y2="170" stroke="#34d399" stroke-width="1.8"/>
  <line x1="680" y1="182" x2="760" y2="182" stroke="#34d399" stroke-width="1.8"/>
  <text x="765" y="145" font-family="system-ui,sans-serif" font-size="8" fill="#059669">callbacks</text>
  <text x="765" y="157" font-family="system-ui,sans-serif" font-size="8" fill="#059669">only when</text>
  <text x="765" y="169" font-family="system-ui,sans-serif" font-size="8" fill="#059669">I/O ready</text>

  <!-- Benefit annotation -->
  <rect x="435" y="290" width="310" height="46" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1.2"/>
  <text x="590" y="308" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#15803d" text-anchor="middle">Cost: 1 thread, fixed memory regardless of connection count</text>
  <text x="590" y="324" font-family="system-ui,sans-serif" font-size="9" fill="#16a34a" text-anchor="middle">No context switch · I/O wait is non-blocking · kernel notifies when data is ready</text>

  <!-- Caption -->
  <line x1="40" y1="358" x2="760" y2="358" stroke="#e2e8f0" stroke-width="1"/>
  <text x="400" y="372" font-family="Georgia,serif" font-size="12" font-weight="700" font-style="italic" fill="#1e293b" text-anchor="middle">Thread-per-connection scales with memory. The event loop scales with kernel I/O notifications.</text>
  <text x="400" y="384" font-family="system-ui,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">orange thread = blocked on slow client · green callbacks = work only when I/O is ready</text>
</svg>
