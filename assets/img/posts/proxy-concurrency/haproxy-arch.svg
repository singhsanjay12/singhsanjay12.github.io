<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -25 800 420" width="800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef2ff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="#c7d2fe" opacity="0.35"/>
    </pattern>
  </defs>

  <rect x="0" y="-25" width="800" height="420" fill="url(#bg)"/>
  <rect x="0" y="-25" width="800" height="420" fill="url(#dots)"/>

  <!-- Title -->
  <text x="400" y="10" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#1e293b" text-anchor="middle">HAProxy — Single Process, nbthread Workers</text>

  <!-- Incoming connections -->
  <text x="32" y="85" font-family="system-ui,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">clients</text>
  <line x1="55" y1="90" x2="92" y2="90" stroke="#4f8ef7" stroke-width="1.8"/>
  <circle cx="58" cy="90" r="3.5" fill="#4f8ef7"/>
  <circle cx="67" cy="90" r="3.5" fill="#4f8ef7"/>
  <circle cx="76" cy="90" r="3.5" fill="#4f8ef7"/>

  <!-- Process outer box -->
  <rect x="92" y="25" width="620" height="320" rx="10" fill="none" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="8 5"/>
  <text x="402" y="44" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#94a3b8" text-anchor="middle">Single Process (haproxy)</text>

  <!-- Shared accept socket at top -->
  <rect x="250" y="55" width="300" height="38" rx="6" fill="#1e293b"/>
  <text x="400" y="71" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="white" text-anchor="middle">Shared Accept Socket</text>
  <text x="400" y="85" font-family="system-ui,sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">SO_REUSEPORT · kernel distributes new connections</text>

  <!-- Distribution lines from shared socket to threads -->
  <line x1="310" y1="93" x2="192" y2="142" stroke="#6366f1" stroke-width="1.5"/>
  <line x1="355" y1="93" x2="330" y2="142" stroke="#6366f1" stroke-width="1.5"/>
  <line x1="445" y1="93" x2="475" y2="142" stroke="#6366f1" stroke-width="1.5"/>
  <line x1="490" y1="93" x2="615" y2="142" stroke="#6366f1" stroke-width="1.5"/>

  <!-- Thread boxes: 4 threads side by side -->
  <!-- Thread 0: cx=155, Thread 1: cx=295, Thread 2: cx=510, Thread 3: cx=650 -- wait too wide. Let me recalculate -->
  <!-- Box width=138, gap=10 → 4 boxes × 138 + 3 × 10 = 582. Start x = 92+19=111. -->
  <!-- Thread 0: x=111, Thread 1: x=259, Thread 2: x=407, Thread 3: x=555 -->

  <!-- Thread 0 -->
  <rect x="111" y="142" width="138" height="150" rx="7" fill="white" stroke="#4f8ef7" stroke-width="1.8"/>
  <text x="180" y="160" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#1e293b" text-anchor="middle">Thread 0</text>
  <!-- Epoll loop icon -->
  <path d="M 162 185 A 16 16 0 1 1 179 200" stroke="#4f8ef7" stroke-width="2" fill="none" stroke-linecap="round"/>
  <polygon points="179,194 179,206 168,200" fill="#4f8ef7"/>
  <text x="180" y="222" font-family="system-ui,sans-serif" font-size="8" fill="#475569" text-anchor="middle">epoll loop</text>
  <text x="180" y="238" font-family="system-ui,sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">8 conns</text>
  <!-- Stick line to backends -->
  <line x1="180" y1="280" x2="180" y2="292" stroke="#34d399" stroke-width="1.5"/>
  <text x="180" y="280" font-family="system-ui,sans-serif" font-size="8" fill="#059669" text-anchor="middle">→ backends</text>

  <!-- Thread 1 -->
  <rect x="259" y="142" width="138" height="150" rx="7" fill="white" stroke="#4f8ef7" stroke-width="1.8"/>
  <text x="328" y="160" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#1e293b" text-anchor="middle">Thread 1</text>
  <path d="M 310 185 A 16 16 0 1 1 327 200" stroke="#4f8ef7" stroke-width="2" fill="none" stroke-linecap="round"/>
  <polygon points="327,194 327,206 316,200" fill="#4f8ef7"/>
  <text x="328" y="222" font-family="system-ui,sans-serif" font-size="8" fill="#475569" text-anchor="middle">epoll loop</text>
  <text x="328" y="238" font-family="system-ui,sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">11 conns</text>
  <text x="328" y="280" font-family="system-ui,sans-serif" font-size="8" fill="#059669" text-anchor="middle">→ backends</text>

  <!-- Thread 2 -->
  <rect x="407" y="142" width="138" height="150" rx="7" fill="white" stroke="#4f8ef7" stroke-width="1.8"/>
  <text x="476" y="160" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#1e293b" text-anchor="middle">Thread 2</text>
  <path d="M 458 185 A 16 16 0 1 1 475 200" stroke="#4f8ef7" stroke-width="2" fill="none" stroke-linecap="round"/>
  <polygon points="475,194 475,206 464,200" fill="#4f8ef7"/>
  <text x="476" y="222" font-family="system-ui,sans-serif" font-size="8" fill="#475569" text-anchor="middle">epoll loop</text>
  <text x="476" y="238" font-family="system-ui,sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">7 conns</text>
  <text x="476" y="280" font-family="system-ui,sans-serif" font-size="8" fill="#059669" text-anchor="middle">→ backends</text>

  <!-- Thread 3 -->
  <rect x="555" y="142" width="138" height="150" rx="7" fill="white" stroke="#4f8ef7" stroke-width="1.8"/>
  <text x="624" y="160" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#1e293b" text-anchor="middle">Thread 3</text>
  <path d="M 606 185 A 16 16 0 1 1 623 200" stroke="#4f8ef7" stroke-width="2" fill="none" stroke-linecap="round"/>
  <polygon points="623,194 623,206 612,200" fill="#4f8ef7"/>
  <text x="624" y="222" font-family="system-ui,sans-serif" font-size="8" fill="#475569" text-anchor="middle">epoll loop</text>
  <text x="624" y="238" font-family="system-ui,sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">9 conns</text>
  <text x="624" y="280" font-family="system-ui,sans-serif" font-size="8" fill="#059669" text-anchor="middle">→ backends</text>

  <!-- Shared state annotation -->
  <rect x="130" y="305" width="540" height="28" rx="5" fill="#fef9c3" stroke="#fde047" stroke-width="1.2"/>
  <text x="400" y="323" font-family="system-ui,sans-serif" font-size="9" fill="#92400e" text-anchor="middle">Threads share: stick-tables, global counters, server health state — protected by a per-object spinlock</text>

  <!-- Config annotation -->
  <text x="400" y="346" font-family="system-ui,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">nbthread auto  |  thread-groups N  |  bind … thread 1-4</text>

  <!-- Caption -->
  <line x1="40" y1="358" x2="760" y2="358" stroke="#e2e8f0" stroke-width="1"/>
  <text x="400" y="372" font-family="Georgia,serif" font-size="12" font-weight="700" font-style="italic" fill="#1e293b" text-anchor="middle">HAProxy is a single process: one socket, nbthread workers, minimal shared state. Predictably thin.</text>
  <text x="400" y="384" font-family="system-ui,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">SO_REUSEPORT lets the kernel load-balance accept() across threads without a global lock</text>
</svg>
