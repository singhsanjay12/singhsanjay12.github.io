<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -25 800 420" width="800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef2ff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="#c7d2fe" opacity="0.35"/>
    </pattern>
  </defs>

  <rect x="0" y="-25" width="800" height="420" fill="url(#bg)"/>
  <rect x="0" y="-25" width="800" height="420" fill="url(#dots)"/>

  <!-- Title -->
  <text x="400" y="10" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#1e293b" text-anchor="middle">Apache Traffic Server — Event Thread Architecture</text>

  <!-- Incoming connections from left -->
  <text x="32" y="82" font-family="system-ui,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">new</text>
  <text x="32" y="93" font-family="system-ui,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">conns</text>
  <line x1="55" y1="87" x2="115" y2="87" stroke="#4f8ef7" stroke-width="1.8" marker-end="url(#arr)"/>
  <circle cx="58" cy="87" r="4" fill="#4f8ef7"/>
  <circle cx="68" cy="87" r="4" fill="#4f8ef7"/>
  <circle cx="78" cy="87" r="4" fill="#4f8ef7"/>

  <!-- Accept Thread box -->
  <rect x="115" y="65" width="150" height="44" rx="6" fill="#1e293b"/>
  <text x="190" y="83" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="white" text-anchor="middle">Accept Thread</text>
  <text x="190" y="97" font-family="system-ui,sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">listen · accept · dispatch</text>

  <!-- Distribution arrows from Accept Thread to ET_NET threads -->
  <!-- Each goes from accept thread right edge (x=265) to ET_NET left edge (x=370) -->
  <!-- ET_NET thread vertical positions: 45, 115, 185, 255 -->
  <line x1="265" y1="80" x2="370" y2="50"  stroke="#6366f1" stroke-width="1.5"/>
  <line x1="265" y1="85" x2="370" y2="120" stroke="#6366f1" stroke-width="1.5"/>
  <line x1="265" y1="89" x2="370" y2="190" stroke="#6366f1" stroke-width="1.5"/>
  <line x1="265" y1="94" x2="370" y2="260" stroke="#6366f1" stroke-width="1.5"/>

  <!-- Arrowheads (simple triangles) -->
  <polygon points="370,46 362,52 362,58" fill="#6366f1"/>
  <polygon points="370,116 362,122 362,128" fill="#6366f1"/>
  <polygon points="370,186 362,192 362,198" fill="#6366f1"/>
  <polygon points="370,256 362,262 362,268" fill="#6366f1"/>

  <!-- "round-robin dispatch" label -->
  <text x="318" y="158" font-family="system-ui,sans-serif" font-size="8" fill="#6366f1" text-anchor="middle" font-style="italic">round-robin</text>
  <text x="318" y="168" font-family="system-ui,sans-serif" font-size="8" fill="#6366f1" text-anchor="middle" font-style="italic">dispatch</text>

  <!-- ET_NET Thread boxes -->
  <!-- ET_NET 0: cy=50, ET_NET 1: cy=120, ET_NET 2: cy=190, ET_NET 3: cy=260 -->
  <!-- Box: x=370, y=cy-22, width=200, height=44 -->

  <!-- ET_NET 0 -->
  <rect x="370" y="28" width="200" height="44" rx="6" fill="white" stroke="#4f8ef7" stroke-width="1.8"/>
  <text x="420" y="45" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#1e293b">ET_NET 0</text>
  <text x="420" y="59" font-family="system-ui,sans-serif" font-size="8" fill="#94a3b8">event loop · 12 conns</text>
  <!-- Mini conn dots -->
  <circle cx="532" cy="43" r="3" fill="#4f8ef7"/><circle cx="541" cy="43" r="3" fill="#4f8ef7"/>
  <circle cx="550" cy="43" r="3" fill="#4f8ef7"/><circle cx="559" cy="43" r="3" fill="#cbd5e1" stroke-dasharray="2 2"/>

  <!-- ET_NET 1 -->
  <rect x="370" y="98" width="200" height="44" rx="6" fill="white" stroke="#4f8ef7" stroke-width="1.8"/>
  <text x="420" y="115" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#1e293b">ET_NET 1</text>
  <text x="420" y="129" font-family="system-ui,sans-serif" font-size="8" fill="#94a3b8">event loop · 9 conns</text>
  <circle cx="532" cy="113" r="3" fill="#4f8ef7"/><circle cx="541" cy="113" r="3" fill="#4f8ef7"/>
  <circle cx="550" cy="113" r="3" fill="#cbd5e1"/>

  <!-- ET_NET 2 -->
  <rect x="370" y="168" width="200" height="44" rx="6" fill="white" stroke="#f97316" stroke-width="1.8"/>
  <text x="420" y="185" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#1e293b">ET_NET 2</text>
  <text x="420" y="199" font-family="system-ui,sans-serif" font-size="8" fill="#f97316">event loop · 18 conns  ⚠</text>
  <circle cx="532" cy="183" r="3" fill="#f97316"/><circle cx="541" cy="183" r="3" fill="#f97316"/>
  <circle cx="550" cy="183" r="3" fill="#f97316"/><circle cx="559" cy="183" r="3" fill="#f97316"/>
  <circle cx="568" cy="183" r="3" fill="#f97316"/>

  <!-- ET_NET 3 -->
  <rect x="370" y="238" width="200" height="44" rx="6" fill="white" stroke="#4f8ef7" stroke-width="1.8"/>
  <text x="420" y="255" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#1e293b">ET_NET 3</text>
  <text x="420" y="269" font-family="system-ui,sans-serif" font-size="8" fill="#94a3b8">event loop · 11 conns</text>
  <circle cx="532" cy="253" r="3" fill="#4f8ef7"/><circle cx="541" cy="253" r="3" fill="#4f8ef7"/>
  <circle cx="550" cy="253" r="3" fill="#4f8ef7"/>

  <!-- Continuation / callback label on right -->
  <rect x="600" y="60" width="178" height="210" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="689" y="80" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#1e293b" text-anchor="middle">Continuation Model</text>
  <line x1="615" y1="87" x2="773" y2="87" stroke="#e2e8f0" stroke-width="1"/>
  <text x="689" y="104" font-family="system-ui,sans-serif" font-size="9" fill="#475569" text-anchor="middle">request arrives → schedule</text>
  <text x="689" y="118" font-family="system-ui,sans-serif" font-size="9" fill="#475569" text-anchor="middle">continuation (callback)</text>
  <text x="689" y="140" font-family="system-ui,sans-serif" font-size="9" fill="#475569" text-anchor="middle">I/O ready → invoke</text>
  <text x="689" y="154" font-family="system-ui,sans-serif" font-size="9" fill="#475569" text-anchor="middle">continuation handler</text>
  <text x="689" y="174" font-family="system-ui,sans-serif" font-size="9" fill="#475569" text-anchor="middle">handler completes or</text>
  <text x="689" y="188" font-family="system-ui,sans-serif" font-size="9" fill="#475569" text-anchor="middle">re-schedules next step</text>
  <text x="689" y="208" font-family="system-ui,sans-serif" font-size="9" fill="#e74c3c" text-anchor="middle">⚠  blocking in a handler</text>
  <text x="689" y="222" font-family="system-ui,sans-serif" font-size="9" fill="#e74c3c" text-anchor="middle">stalls all conns on thread</text>
  <text x="689" y="240" font-family="system-ui,sans-serif" font-size="9" fill="#475569" text-anchor="middle">thread count = proxy.config</text>
  <text x="689" y="254" font-family="system-ui,sans-serif" font-size="9" fill="#475569" text-anchor="middle">.exec.thread.limit</text>

  <!-- Arrows from ET_NET boxes to continuation panel -->
  <line x1="570" y1="50"  x2="598" y2="120" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="570" y1="120" x2="598" y2="140" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="570" y1="190" x2="598" y2="160" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="570" y1="260" x2="598" y2="180" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Caption -->
  <line x1="40" y1="358" x2="760" y2="358" stroke="#e2e8f0" stroke-width="1"/>
  <text x="400" y="372" font-family="Georgia,serif" font-size="12" font-weight="700" font-style="italic" fill="#1e293b" text-anchor="middle">ATS distributes connections across event threads. A blocking plugin call stalls every connection on that thread.</text>
  <text x="400" y="384" font-family="system-ui,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">orange ET_NET 2 = overloaded thread · thread count set via proxy.config.exec.thread.limit</text>
</svg>
